<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>My Messages · LYMX</title>
<link rel="icon" type="image/png" href="favicon.png" />
<style>
  :root{--ink:#0e1116;--ink-2:#1a1f27;--muted:#5b6472;--line:#e6e8ec;--bg:#f6f7f9;--accent:#0a84ff;--accent-2:#0050c7;--ok:#13a26b;--soft:#eef4ff}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
  .layout{margin-left:240px;display:grid;grid-template-columns:380px 1fr;height:100vh;overflow:hidden}
  @media(max-width:880px){.layout{margin-left:0;grid-template-columns:1fr}.layout .thread-pane{display:none}.layout.show-thread .thread-pane{display:flex}.layout.show-thread .list-pane{display:none}}

  .list-pane{background:#fff;border-right:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column}
  .list-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:10px;position:sticky;top:0;background:#fff;z-index:5}
  .list-head h1{margin:0;font-size:20px;font-weight:800}
  .list-head .sub{color:var(--muted);font-size:13px}
  .btn-new{padding:9px 12px;border-radius:8px;background:var(--ink);color:#fff;border:0;font-weight:700;font-size:14px;cursor:pointer}
  .btn-new:hover{background:#000}

  .conv-item{padding:14px 18px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:.12s}
  .conv-item:hover{background:#fafbfc}
  .conv-item.active{background:var(--soft);border-left:3px solid var(--accent)}
  .conv-item.unread .preview{font-weight:600;color:var(--ink)}
  .conv-item .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .conv-item .title{font-weight:700;color:var(--ink);font-size:14.5px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .conv-item .time{font-size:11.5px;color:var(--muted)}
  .conv-item .preview{font-size:13px;color:#475569;line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .conv-item .unread-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block}

  .thread-pane{background:#fff;display:flex;flex-direction:column;overflow:hidden}
  .thread-head{padding:16px 22px;border-bottom:1px solid var(--line);background:#fff}
  .thread-head h2{margin:0;font-size:18px;font-weight:800}
  .thread-head .sub{margin-top:4px;color:var(--muted);font-size:13px}
  .thread-body{flex:1;overflow-y:auto;padding:18px 22px;background:#fafbfc}
  .empty{padding:60px 24px;text-align:center;color:var(--muted);font-size:14px}
  .msg{margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
  .msg.mine{flex-direction:row-reverse}
  .msg .av{width:32px;height:32px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .msg.mine .av{background:var(--accent)}
  .msg .bubble{max-width:540px;padding:11px 14px;border-radius:12px;background:#fff;border:1px solid var(--line)}
  .msg.mine .bubble{background:var(--soft);border-color:#d3e3ff}
  .msg .who{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:4px}
  .msg .body{font-size:14px;line-height:1.55;color:var(--ink-2);white-space:pre-wrap;word-wrap:break-word}
  .msg .when{font-size:11px;color:var(--muted);margin-top:4px}

  .reply-bar{border-top:1px solid var(--line);padding:14px 22px;background:#fff}
  .reply-bar textarea{width:100%;min-height:70px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:14px;resize:vertical}
  .reply-bar .row{display:flex;gap:8px;margin-top:8px}
  .reply-bar .send{margin-left:auto;padding:8px 16px;background:var(--ink);color:#fff;border:0;border-radius:8px;font-weight:700;cursor:pointer}

  /* New-thread modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:14px;padding:24px;width:480px;max-width:92vw}
  .modal h3{margin:0 0 12px;font-size:18px}
  .modal label{display:block;font-weight:600;font-size:13px;margin:10px 0 4px}
  .modal input, .modal select, .modal textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;font:inherit;font-size:14px}
  .modal textarea{min-height:100px;resize:vertical}
  .modal .actions{display:flex;gap:8px;margin-top:14px}
  .modal .actions .cancel{margin-right:auto;padding:8px 16px;background:#fff;border:1px solid var(--line);border-radius:8px;cursor:pointer}
  .modal .actions .submit{padding:8px 16px;background:var(--ink);color:#fff;border:0;border-radius:8px;font-weight:700;cursor:pointer}

  .alert{padding:9px 13px;border-radius:8px;margin-top:10px;font-size:13.5px}
  .alert.ok{background:#e6f5ee;color:#065f46;border-left:3px solid #10b981}
  .alert.err{background:#fee2e2;color:#991b1b;border-left:3px solid #dc2626}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lymx-config.js"></script>
<script src="lymx-sidebar.js" defer></script>
<script src="lymx-feedback.js" defer></script>
<script src="lymx-app.js" defer></script>

<div class="layout" id="layout">
  <section class="list-pane">
    <div class="list-head">
      <h1>📬 My Messages</h1>
      <div class="sub">All your conversations with LYMX support and partner businesses, in one place.</div>
      <button class="btn-new" id="newBtn">+ New message</button>
    </div>
    <div id="convList"></div>
  </section>

  <section class="thread-pane" id="threadPane">
    <div class="thread-head">
      <h2 id="threadTitle">Select a conversation</h2>
      <div class="sub" id="threadSub"></div>
    </div>
    <div class="thread-body" id="threadBody">
      <div class="empty">Pick a thread from the list to read.</div>
    </div>
    <div class="reply-bar" id="replyBar" style="display:none">
      <textarea id="replyInput" placeholder="Type your message…"></textarea>
      <div class="row"><button class="send" id="sendBtn">Send</button></div>
      <div id="banner"></div>
    </div>
  </section>
</div>

<!-- New thread modal -->
<div class="modal-overlay" id="newModal">
  <div class="modal">
    <h3>Start a new conversation</h3>
    <label>Who do you want to message?</label>
    <select id="newRecipientType">
      <option value="support">💬 LYMX Support</option>
      <option value="business">🏪 A LYMX business</option>
    </select>
    <div id="newBizPickerWrap" style="display:none">
      <label>Pick a business</label>
      <input id="newBizPicker" placeholder="Type business name…" />
      <div id="newBizSuggestions" style="background:#fff;border:1px solid var(--line);border-radius:7px;max-height:160px;overflow-y:auto;margin-top:4px;display:none"></div>
    </div>
    <label>Subject</label>
    <input id="newSubject" placeholder="What is this about?" />
    <label>Message</label>
    <textarea id="newBody" placeholder="Type your message…"></textarea>
    <div class="actions">
      <button class="cancel" id="newCancel">Cancel</button>
      <button class="submit" id="newSubmit">Send</button>
    </div>
    <div id="newBanner"></div>
  </div>
</div>

<script>
(function(){
  if (typeof window.supabase === "undefined" || !window.LYMX_CONFIG) { console.error("Supabase config missing"); return; }
  const SUPABASE_URL = window.LYMX_CONFIG.SUPABASE_URL;
  const SUPABASE_ANON = window.LYMX_CONFIG.SUPABASE_ANON_KEY;
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { auth:{ persistSession:true } });

  let me = null, myCustomerId = null, myBusinessId = null, myPartnerId = null;
  let activeConvId = null;
  let convCache = [];

  const $ = id => document.getElementById(id);
  const esc = s => String(s==null?"":s).replace(/[<>&"]/g, c=>({ "<":"&lt;",">":"&gt;","&":"&amp;","\"":"&quot;" }[c]));
  function timeAgo(iso){
    if(!iso) return ""; const d = new Date(iso), s = Math.round((Date.now()-d)/1000);
    if (s < 60) return "now"; if (s < 3600) return Math.round(s/60)+"m"; if (s < 86400) return Math.round(s/3600)+"h"; if (s < 604800) return Math.round(s/86400)+"d";
    return d.toLocaleDateString();
  }
  function initials(n){ return (n||"?").split(/\s+/).map(s=>s[0]).filter(Boolean).slice(0,2).join("").toUpperCase(); }

  // Load my conversations: threads where I'm subject OR participant
  async function loadConversations(){
    const orParts = [];
    if (myCustomerId) orParts.push(`and(subject_type.eq.customer,subject_customer_id.eq.${myCustomerId})`);
    if (myBusinessId) orParts.push(`and(subject_type.eq.business,subject_business_id.eq.${myBusinessId})`);
    if (myPartnerId)  orParts.push(`and(subject_type.eq.partner,subject_partner_id.eq.${myPartnerId})`);

    // Subject-anchored threads
    let mineSet = [];
    if (orParts.length > 0) {
      const { data } = await sb.from("conversations").select("*").or(orParts.join(",")).order("last_message_at", { ascending:false, nullsFirst:false }).limit(200);
      mineSet = data || [];
    }

    // Plus threads where I'm a participant (peer-to-peer)
    const { data: parts } = await sb.from("conversation_participants").select("conversation_id").eq("user_id", me.id);
    const partConvIds = (parts||[]).map(p => p.conversation_id);
    let partThreads = [];
    if (partConvIds.length > 0) {
      const { data: pc } = await sb.from("conversations").select("*").in("id", partConvIds);
      partThreads = pc || [];
    }

    // Merge unique
    const seen = new Set();
    const merged = [];
    [...mineSet, ...partThreads].forEach(c => { if (!seen.has(c.id)) { seen.add(c.id); merged.push(c); } });
    merged.sort((a,b) => new Date(b.last_message_at||0) - new Date(a.last_message_at||0));
    convCache = merged;
    renderList();
  }

  function renderList(){
    if (convCache.length === 0) {
      $("convList").innerHTML = '<div class="empty">No messages yet. Click "+ New message" to start.</div>';
      return;
    }
    $("convList").innerHTML = convCache.map(c => `
      <div class="conv-item ${c.id===activeConvId?'active':''} ${c.unread_count_subject>0?'unread':''}" data-id="${c.id}">
        <div class="top">
          <span class="title">${esc(c.title || c.kind)}</span>
          <span class="time">${timeAgo(c.last_message_at||c.created_at)}</span>
          ${c.unread_count_subject>0?'<span class="unread-dot"></span>':''}
        </div>
        <div class="preview">${esc(c.last_message_preview || "(no messages yet)")}</div>
      </div>
    `).join("");
    document.querySelectorAll(".conv-item").forEach(el => el.addEventListener("click", () => openConv(el.dataset.id)));
  }

  async function openConv(convId){
    activeConvId = convId;
    document.getElementById("layout").classList.add("show-thread");
    const c = convCache.find(x => x.id === convId);
    if (!c) return;
    $("threadTitle").textContent = c.title || c.kind;
    $("threadSub").textContent = c.kind + " · " + c.status;
    $("replyBar").style.display = "block";

    const { data: msgs } = await sb.from("conversation_messages")
      .select("*").eq("conversation_id", convId).eq("is_internal_note", false)
      .order("created_at", { ascending:true });
    renderMessages(msgs || []);

    // Mark as read
    sb.from("conversations").update({ unread_count_subject: 0 }).eq("id", convId).then(()=>{});
    document.querySelectorAll(".conv-item").forEach(el => el.classList.toggle("active", el.dataset.id===convId));
  }

  function renderMessages(msgs){
    if (msgs.length === 0) {
      $("threadBody").innerHTML = '<div class="empty">No messages yet.</div>';
      return;
    }
    $("threadBody").innerHTML = msgs.map(m => {
      const mine = m.sender_user_id === me.id;
      const who = mine ? "You" : (m.sender_name_snapshot || m.sender_type || "LYMX team");
      return `<div class="msg ${mine?'mine':''}" data-msg-id="${m.id}" data-msg-source-locale="${m.source_locale||''}">
        <div class="av">${initials(who)}</div>
        <div class="bubble">
          <div class="who">${esc(who)}</div>
          <div class="body" data-orig-body>${esc(m.body||"")}</div>
          <div class="when">${new Date(m.created_at).toLocaleString()}${mine?'':' · <button class="translate-btn" type="button" data-msg-id="'+m.id+'" style="background:transparent;border:0;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;padding:0;font-family:inherit">Translate</button>'}</div>
        </div>
      </div>`;
    }).join("");
    $("threadBody").scrollTop = $("threadBody").scrollHeight;
    $("threadBody").querySelectorAll('.translate-btn').forEach(btn => btn.addEventListener('click', () => onTranslateClick(btn)));
  }

  async function onTranslateClick(btn){
    const msgEl = btn.closest('.msg'); if (!msgEl) return;
    const target = (window.LymxI18n && window.LymxI18n.getLocale && window.LymxI18n.getLocale()) || 'en';
    const bodyEl = msgEl.querySelector('[data-orig-body]');
    if (btn.dataset.state === 'translated') {
      bodyEl.textContent = btn.dataset.origBody || bodyEl.textContent;
      btn.textContent = 'Translate'; btn.dataset.state = ''; return;
    }
    btn.textContent = 'Translating…'; btn.disabled = true;
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { btn.textContent = 'Translate'; btn.disabled = false; return; }
    try {
      btn.dataset.origBody = bodyEl.textContent;
      const r = await fetch(SUPABASE_URL+'/functions/v1/translate-text', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+session.access_token, 'apikey':SUPABASE_ANON },
        body: JSON.stringify({ text: bodyEl.textContent, target_locale: target, source_locale: msgEl.dataset.msgSourceLocale || 'auto' })
      });
      const j = await r.json();
      if (j.ok) { bodyEl.textContent = j.translated_text; btn.textContent = 'Show original'; btn.dataset.state = 'translated'; }
      else { btn.textContent = 'Translate failed'; setTimeout(() => { btn.textContent = 'Translate'; }, 3000); }
    } catch(e) { btn.textContent = 'Translate failed'; setTimeout(() => { btn.textContent = 'Translate'; }, 3000); }
    finally { btn.disabled = false; }
  }

  async function sendReply(){
    const text = $("replyInput").value.trim();
    if (!text || !activeConvId) return;
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { alert("Not signed in"); return; }
    $("sendBtn").disabled = true;
    try {
      const r = await fetch(SUPABASE_URL+"/functions/v1/conversation-send-message", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+session.access_token, "apikey":SUPABASE_ANON },
        body: JSON.stringify({ conversation_id: activeConvId, channel: "in_app", body: text }),
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error);
      $("replyInput").value = "";
      await openConv(activeConvId);
      await loadConversations();
    } catch(e) {
      $("banner").innerHTML = '<div class="alert err">Could not send: '+esc(e.message)+'</div>';
    } finally { $("sendBtn").disabled = false; }
  }

  // New thread
  async function openNewModal(){ $("newModal").classList.add("show"); }
  function closeNewModal(){ $("newModal").classList.remove("show"); $("newBanner").innerHTML=""; $("newSubject").value=""; $("newBody").value=""; }

  async function searchBusinesses(q){
    if (!q || q.length < 2) { $("newBizSuggestions").style.display="none"; return; }
    const { data } = await sb.from("businesses").select("id, display_name, legal_name").or(`display_name.ilike.%${q}%,legal_name.ilike.%${q}%`).limit(8);
    if (!data || data.length===0) { $("newBizSuggestions").innerHTML='<div style="padding:8px;color:var(--muted);font-size:13px">No matches</div>'; $("newBizSuggestions").style.display="block"; return; }
    $("newBizSuggestions").innerHTML = data.map(b => `<div data-id="${b.id}" data-name="${esc(b.display_name||b.legal_name)}" style="padding:8px 11px;cursor:pointer;border-bottom:1px solid #f3f4f6;font-size:13.5px">${esc(b.display_name||b.legal_name)}</div>`).join("");
    $("newBizSuggestions").style.display="block";
    document.querySelectorAll("#newBizSuggestions div[data-id]").forEach(el => el.addEventListener("click", () => {
      $("newBizPicker").value = el.dataset.name;
      $("newBizPicker").dataset.selectedId = el.dataset.id;
      $("newBizSuggestions").style.display="none";
    }));
  }

  async function submitNew(){
    const recipient = $("newRecipientType").value;
    const subject = $("newSubject").value.trim();
    const bodyText = $("newBody").value.trim();
    if (!subject || !bodyText) { $("newBanner").innerHTML='<div class="alert err">Subject + message are required</div>'; return; }

    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;

    let payload;
    if (recipient === "support") {
      // 2026-05-19 #f99eef4c - was: subject_type fell through to "none" + null id
      // when user had no customer/business/partner row yet. Now: self-heal by
      // creating a customers row if missing, so the support thread can anchor.
      let subjectType = myCustomerId ? "customer" : (myBusinessId ? "business" : (myPartnerId ? "partner" : null));
      let subjectId   = myCustomerId || myBusinessId || myPartnerId || null;
      if (!subjectType) {
        try {
          const { data: created, error: cErr } = await sb.from("customers").upsert(
            { user_id: session.user.id, email: session.user.email },
            { onConflict: "user_id" }
          ).select("id").single();
          if (cErr) throw cErr;
          subjectType = "customer";
          subjectId = created.id;
          myCustomerId = created.id;
        } catch (e) {
          $("newBanner").innerHTML = '<div class="alert err">Could not initialize your account: ' + esc(e.message || 'unknown') + '</div>';
          return;
        }
      }
      payload = { subject_type: subjectType, subject_id: subjectId, kind: "support", title: subject, channel: "in_app", body: bodyText };
    } else {
      // Thread anchored on the picked business
      const bizId = $("newBizPicker").dataset.selectedId;
      if (!bizId) { $("newBanner").innerHTML='<div class="alert err">Pick a business first</div>'; return; }
      payload = { subject_type: "business", subject_id: bizId, kind: "general", title: subject, channel: "in_app", body: bodyText };
    }

    try {
      const r = await fetch(SUPABASE_URL+"/functions/v1/conversation-send-message", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+session.access_token, "apikey":SUPABASE_ANON },
        body: JSON.stringify(payload),
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error);
      closeNewModal();
      await loadConversations();
      await openConv(j.conversation_id);
    } catch(e) {
      $("newBanner").innerHTML = '<div class="alert err">'+esc(e.message)+'</div>';
    }
  }

  async function init(){
    const { data: { user } } = await sb.auth.getUser();
    if (!user) { window.location.href = "login.html?next="+encodeURIComponent(location.pathname); return; }
    me = user;

    // Resolve which subject_id I am
    const [{data:c}, {data:b}, {data:p}] = await Promise.all([
      sb.from("customers").select("id").eq("user_id", me.id).maybeSingle(),
      sb.from("businesses").select("id").eq("owner_user_id", me.id).maybeSingle(),
      sb.from("partners").select("id").eq("user_id", me.id).maybeSingle(),
    ]);
    myCustomerId = c?.id || null;
    myBusinessId = b?.id || null;
    myPartnerId  = p?.id || null;

    $("sendBtn").addEventListener("click", sendReply);
    $("newBtn").addEventListener("click", openNewModal);
    $("newCancel").addEventListener("click", closeNewModal);
    $("newSubmit").addEventListener("click", submitNew);
    $("newRecipientType").addEventListener("change", e => {
      $("newBizPickerWrap").style.display = e.target.value === "business" ? "" : "none";
    });
    $("newBizPicker").addEventListener("input", e => searchBusinesses(e.target.value));

    await loadConversations();

    // Realtime
    sb.channel("my-conv-refresh")
      .on("postgres_changes", { event:"INSERT", schema:"public", table:"conversation_messages" }, () => {
        loadConversations();
        if (activeConvId) openConv(activeConvId);
      }).subscribe();
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
