<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Review Verification — LYMX Admin</title>
<style>
  :root{--ink:#0e1116;--muted:#5b6472;--line:#e6e8ec;--bg:#f6f7f9;--accent:#0a84ff;--ok:#13a26b;--warn:#f0a020;--err:#b81324}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
  .main{margin-left:240px;padding:24px 32px}
  @media(max-width:880px){.main{margin-left:0;padding:16px}}
  h1{margin:0 0 6px;font-size:26px;font-weight:800}
  .sub{color:var(--muted);font-size:14px;margin-bottom:22px}
  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .tab{padding:10px 16px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
  .tab .ct{display:inline-block;background:#eef2f7;color:var(--muted);font-size:11.5px;padding:1px 7px;border-radius:999px;margin-left:6px;font-weight:700}
  .tab.active .ct{background:var(--accent);color:#fff}
  .list{display:grid;gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:18px;display:grid;grid-template-columns:120px 1fr 200px;gap:18px;align-items:start}
  @media(max-width:780px){.card{grid-template-columns:1fr}}
  .thumb{width:120px;height:120px;background:#eef2f7;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;overflow:hidden;cursor:pointer}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .meta .biz{font-weight:700;font-size:16px;color:var(--ink)}
  .meta .reviewer{font-size:13px;color:var(--muted);margin-top:2px}
  .meta .stars{color:var(--warn);font-size:15px;margin-top:6px;letter-spacing:1px}
  .meta .body{margin-top:8px;font-size:14px;color:#1a1f27;background:var(--bg);padding:10px 12px;border-radius:7px;border:1px solid var(--line);max-height:140px;overflow:auto}
  .meta .when{font-size:12px;color:var(--muted);margin-top:8px}
  .actions{display:flex;flex-direction:column;gap:8px}
  .btn{padding:10px 14px;border-radius:8px;font-weight:700;font-size:13.5px;cursor:pointer;border:none;font-family:inherit}
  .btn-approve{background:var(--ok);color:#fff}
  .btn-reject{background:#fff;color:var(--err);border:1.5px solid var(--err)}
  .btn-view{background:#fff;color:var(--accent);border:1.5px solid var(--accent);font-size:12.5px;padding:8px 12px}
  .empty{padding:48px;text-align:center;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:11px}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;padding:24px;cursor:zoom-out}
  .lightbox.open{display:flex}
  .lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:99998;display:none}
  .toast.show{display:block}
  .toast.ok{background:var(--ok)}
  .toast.err{background:var(--err)}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700;margin-left:6px}
  .badge.tx{background:#e6f0ff;color:#0050c7}
  .badge.receipt{background:#fff4d6;color:#8a5e00}
</style>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<meta name="theme-color" content="#0a84ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="LYMX" />
<meta name="mobile-web-app-capable" content="yes" />
</head>
<body data-role-required="perm:admin_reviews">

<script src="lymx-config.js"></script>
<script src="lymx-sidebar.js" defer></script>
<script src="lymx-feedback.js" defer></script>
<script src="lymx-app.js" defer></script>

<main class="main">
  <h1>Review Verification</h1>
  <div class="sub">Approve or reject receipt-uploaded reviews. Approved reviews go live on the biz page and the reviewer is auto-credited 100 LYMX.</div>

  <div class="tabs">
    <div class="tab active" data-tab="pending">Pending <span class="ct" id="ctPending">—</span></div>
    <div class="tab" data-tab="verified">Verified <span class="ct" id="ctVerified">—</span></div>
    <div class="tab" data-tab="rejected">Rejected <span class="ct" id="ctRejected">—</span></div>
  </div>

  <div id="list" class="list"></div>
</main>

<div class="lightbox" id="lightbox"><img id="lightboxImg" /></div>
<div class="toast" id="toast"></div>

<script>
window.addEventListener('DOMContentLoaded', async function () {
  if (!window.LYMX || !window.LYMX.getSession) { setTimeout(arguments.callee, 100); return; }
  var ANON = window.LYMX_CONFIG.SUPABASE_ANON_KEY;
  var URL = window.LYMX_CONFIG.SUPABASE_URL;
  var session = await window.LYMX.getSession();
  if (!session) { location.href = 'login.html?return=admin-reviews.html'; return; }

  // Admin guard: check staff_roles
  try {
    var rg = await fetch(URL + '/rest/v1/rpc/am_i_admin', {
      method: 'POST',
      headers: { apikey: ANON, Authorization: 'Bearer ' + session.access_token, 'Content-Type': 'application/json' },
      body: '{}'
    });
    var isAdmin = rg.ok ? await rg.json() : false;
    if (!isAdmin) { document.body.innerHTML = '<div style="padding:48px;text-align:center;color:#b81324;font-weight:700">Admin only — you do not have access to this page.</div>'; return; }
  } catch (e) {
    document.body.innerHTML = '<div style="padding:48px;text-align:center;color:#b81324">Could not verify admin access: ' + e.message + '</div>'; return;
  }

  var currentTab = 'pending';
  var listEl = document.getElementById('list');
  var toastEl = document.getElementById('toast');
  function toast(msg, cls) {
    toastEl.textContent = msg;
    toastEl.className = 'toast show ' + (cls || '');
    setTimeout(function () { toastEl.className = 'toast'; }, 2800);
  }

  document.querySelectorAll('.tab').forEach(function (t) {
    t.addEventListener('click', function () {
      document.querySelectorAll('.tab').forEach(function (x) { x.classList.remove('active'); });
      t.classList.add('active');
      currentTab = t.dataset.tab;
      loadList();
    });
  });

  async function refreshCounts() {
    try {
      var r = await fetch(URL + '/rest/v1/reviews?select=verification_status', {
        headers: { apikey: ANON, Authorization: 'Bearer ' + session.access_token, Prefer: 'count=exact' }
      });
      var rows = r.ok ? await r.json() : [];
      var ct = { pending: 0, verified: 0, rejected: 0 };
      rows.forEach(function (x) { ct[x.verification_status] = (ct[x.verification_status] || 0) + 1; });
      document.getElementById('ctPending').textContent = ct.pending || 0;
      document.getElementById('ctVerified').textContent = ct.verified || 0;
      document.getElementById('ctRejected').textContent = ct.rejected || 0;
    } catch (e) { console.warn('[admin-reviews.html:L132] silent error', e); }
  }

  async function getSignedUrl(path) {
    try {
      var r = await fetch(URL + '/storage/v1/object/sign/review-receipts/' + encodeURIComponent(path) + '?expiresIn=600', {
        method: 'POST',
        headers: { apikey: ANON, Authorization: 'Bearer ' + session.access_token, 'Content-Type': 'application/json' },
        body: '{}'
      });
      if (!r.ok) return null;
      var j = await r.json();
      return URL + '/storage/v1' + j.signedURL;
    } catch (e) { return null; }
  }

  async function loadList() {
    listEl.innerHTML = '<div class="empty">Loading…</div>';
    try {
      var r = await fetch(URL + '/rest/v1/reviews?verification_status=eq.' + currentTab + '&select=id,reviewer_user_id,business_slug,business_name,rating,body,has_photo,transaction_id,receipt_image_url,verification_status,created_at,verified_at,rejection_reason&order=created_at.desc&limit=100', {
        headers: { apikey: ANON, Authorization: 'Bearer ' + session.access_token }
      });
      if (!r.ok) throw new Error('http ' + r.status);
      var rows = await r.json();
      if (!rows.length) { listEl.innerHTML = '<div class="empty">No ' + currentTab + ' reviews.</div>'; return; }
      listEl.innerHTML = '';
      for (var i = 0; i < rows.length; i++) {
        var x = rows[i];
        var stars = '★'.repeat(x.rating) + '☆'.repeat(5 - x.rating);
        var when = new Date(x.created_at).toLocaleString();
        var proofBadge = x.transaction_id ? '<span class="badge tx">Transaction</span>' : (x.receipt_image_url ? '<span class="badge receipt">Receipt photo</span>' : '');
        var thumbHtml = '<div class="thumb">No photo</div>';
        if (x.receipt_image_url) {
          thumbHtml = '<div class="thumb" data-path="' + x.receipt_image_url + '">Loading…</div>';
        } else if (x.transaction_id) {
          thumbHtml = '<div class="thumb" style="background:#e6f0ff;color:#0050c7;font-weight:700">TX<br>verified</div>';
        }
        var actions = '';
        if (currentTab === 'pending') {
          actions = '<button class="btn btn-approve" data-act="approve" data-id="' + x.id + '">✓ Approve</button>'
                  + '<button class="btn btn-reject" data-act="reject" data-id="' + x.id + '">✗ Reject</button>';
        } else if (currentTab === 'verified') {
          actions = '<div style="font-size:12.5px;color:#5b6472">Verified ' + (x.verified_at ? new Date(x.verified_at).toLocaleString() : '') + '</div>'
                  + '<button class="btn btn-reject" data-act="reject" data-id="' + x.id + '">Unverify / reject</button>';
        } else {
          actions = '<div style="font-size:12.5px;color:#b81324">' + (x.rejection_reason ? 'Reason: ' + x.rejection_reason.replace(/[<>]/g, '') : 'Rejected') + '</div>'
                  + '<button class="btn btn-approve" data-act="approve" data-id="' + x.id + '">Re-approve</button>';
        }
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = thumbHtml
          + '<div class="meta">'
          +   '<div class="biz">' + x.business_name + ' ' + proofBadge + '</div>'
          +   '<div class="reviewer">Reviewer: ' + x.reviewer_user_id.slice(0, 8) + '… · ' + x.business_slug + '</div>'
          +   '<div class="stars">' + stars + ' (' + x.rating + '/5)</div>'
          +   '<div class="body">' + (x.body || '').replace(/[<>]/g, '').replace(/\n/g, '<br>') + '</div>'
          +   '<div class="when">' + when + '</div>'
          + '</div>'
          + '<div class="actions">' + actions + '</div>';
        listEl.appendChild(card);
        // Lazy-load receipt thumbnail (signed URL)
        if (x.receipt_image_url) {
          (function (path, thumbDiv) {
            getSignedUrl(path).then(function (url) {
              if (!url) { thumbDiv.textContent = 'No preview'; return; }
              thumbDiv.innerHTML = '<img src="' + url + '" alt="Receipt">';
              thumbDiv.addEventListener('click', function () {
                document.getElementById('lightboxImg').src = url;
                document.getElementById('lightbox').classList.add('open');
              });
            });
          })(x.receipt_image_url, card.querySelector('.thumb'));
        }
      }
      // Wire approve/reject buttons
      listEl.querySelectorAll('button[data-act]').forEach(function (b) {
        b.addEventListener('click', function () {
          var id = b.dataset.id;
          var act = b.dataset.act;
          if (act === 'approve') doApprove(id, b);
          if (act === 'reject') doReject(id, b);
        });
      });
    } catch (e) {
      listEl.innerHTML = '<div class="empty" style="color:#b81324">Could not load: ' + e.message + '</div>';
    }
  }

  async function doApprove(id, btn) {
    btn.disabled = true; btn.textContent = 'Approving…';
    try {
      var r = await fetch(URL + '/rest/v1/reviews?id=eq.' + id, {
        method: 'PATCH',
        headers: { apikey: ANON, Authorization: 'Bearer ' + session.access_token, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ verification_status: 'verified', verified_by_user_id: session.user.id, verified_at: new Date().toISOString(), rejection_reason: null })
      });
      if (!r.ok) throw new Error('http ' + r.status);
      toast('Approved — 100 LYMX credited.', 'ok');
      refreshCounts();
      loadList();
    } catch (e) {
      btn.disabled = false; btn.textContent = '✓ Approve';
      toast('Approve failed: ' + e.message, 'err');
    }
  }

  async function doReject(id, btn) {
    var reason = prompt('Reason for rejecting this review?\n\n(Sent to reviewer so they can re-submit with clearer evidence.)');
    if (reason === null) return;
    reason = (reason || '').trim();
    if (!reason) { toast('A reason is required.', 'err'); return; }
    btn.disabled = true; btn.textContent = 'Rejecting…';
    try {
      var r = await fetch(URL + '/rest/v1/reviews?id=eq.' + id, {
        method: 'PATCH',
        headers: { apikey: ANON, Authorization: 'Bearer ' + session.access_token, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ verification_status: 'rejected', rejection_reason: reason, verified_by_user_id: session.user.id, verified_at: new Date().toISOString() })
      });
      if (!r.ok) throw new Error('http ' + r.status);
      toast('Rejected. Reviewer will be notified.', 'ok');
      refreshCounts();
      loadList();
    } catch (e) {
      btn.disabled = false; btn.textContent = '✗ Reject';
      toast('Reject failed: ' + e.message, 'err');
    }
  }

  document.getElementById('lightbox').addEventListener('click', function () { this.classList.remove('open'); });

  refreshCounts();
  loadList();
});
</script>

<script src="lymx-role-gate.js" defer></script>
</body>
</html>
