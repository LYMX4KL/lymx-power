<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="LYMX — your RSVPs to LYMX events." />
<meta name="robots" content="noindex,nofollow" />
<title>My RSVPs · LYMX</title>
<style>
  :root{--ink:#0e1116;--ink-2:#1a1f27;--muted:#5b6472;--line:#e6e8ec;--bg:#ffffff;--bg-soft:#f6f7f9;--accent:#0a84ff;--accent-2:#0050c7;--ok:#13a26b;--warn:#f0a020;--danger:#e0413e;--maxw:880px}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-soft)}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);line-height:1.55}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:24px 20px 80px}
  .page-head h1{margin:0 0 6px;font-size:26px;font-weight:800;letter-spacing:-.01em}
  .page-head p{margin:0 0 18px;color:var(--muted);font-size:14.5px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .card .name{font-weight:800;font-size:15px;color:var(--ink)}
  .card .meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .card .notes{margin-top:6px;font-size:13.5px;color:var(--ink-2);font-style:italic}
  .pill{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
  .pill.going{background:#dff8ec;color:#0c6940}
  .pill.interested{background:#e6f0ff;color:#0a3a8a}
  .pill.declined{background:#eef0f3;color:var(--muted)}
  .pill.cancelled{background:#fde8e6;color:#7a1a17}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .btn{appearance:none;border:0;border-radius:7px;padding:7px 12px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn-danger{color:var(--danger);border-color:var(--danger)}
  .empty{text-align:center;padding:50px 20px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:12px}
  .banner{padding:11px 14px;border-radius:8px;margin-bottom:14px;font-size:14px}
  .banner.ok{background:#dff8ec;color:#0c6940}
  .banner.err{background:#fde8e6;color:#7a1a17}
</style>
</head>
<body>
<script src="lymx-config.js"></script>
<script src="lymx-app.js"></script>
<script src="lymx-nav.js" defer></script>

<main class="wrap">
  <div class="page-head">
    <h1>My RSVPs</h1>
    <p>Events you've RSVP'd to. Cancel any time before the event.</p>
  </div>

  <div id="bannerArea"></div>
  <div id="list"><div class="empty">Loading…</div></div>
</main>

<script src="lymx-sidebar.js" defer></script>
<script>
(async function init(){
  if (!window.LYMX || !window.LYMX.getSession) { setTimeout(init,100); return; }
  const session = await window.LYMX.getSession();
  if (!session) { location.href = '/login.html?next=' + encodeURIComponent(location.pathname); return; }
  await load();
})();

const esc = (s) => String(s == null ? '' : s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
function banner(t, m) {
  document.getElementById('bannerArea').innerHTML = '<div class="banner ' + t + '">' + esc(m) + '</div>';
  if (t === 'ok') setTimeout(() => document.getElementById('bannerArea').innerHTML = '', 4000);
}

async function load() {
  const cfg = window.LYMX_CONFIG;
  const session = await window.LYMX.getSession();
  const tok = session.access_token;
  // Read by user_id OR by attendee_email (RLS handles both)
  const r = await fetch(cfg.SUPABASE_URL +
    '/rest/v1/event_rsvps?or=(user_id.eq.' + session.user.id + ',attendee_email.eq.' + encodeURIComponent(session.user.email || '') + ')' +
    '&order=created_at.desc&select=id,event_slug,event_title,party_size,status,notes,dietary_notes,plus_ones,created_at', {
    headers: { apikey: cfg.SUPABASE_ANON_KEY, Authorization: 'Bearer '+tok }
  });
  if (!r.ok) {
    document.getElementById('list').innerHTML =
      '<div class="empty">Could not load RSVPs (' + r.status + '). Make sure migration 085 ran.</div>';
    return;
  }
  const rows = await r.json();
  if (!rows.length) {
    document.getElementById('list').innerHTML =
      '<div class="empty">No RSVPs yet. <br><br>' +
      '<a href="launch-event.html" style="color:var(--accent);text-decoration:underline">Launch event</a></div>';
    return;
  }
  document.getElementById('list').innerHTML = rows.map(r =>
    '<div class="card">' +
      '<div style="flex:1;min-width:0">' +
        '<div class="name">' +
          (r.event_title ? esc(r.event_title) : esc(r.event_slug || 'Event')) +
          ' <span class="pill ' + esc(r.status) + '">' + esc(r.status) + '</span>' +
        '</div>' +
        '<div class="meta">' +
          'Party of ' + r.party_size +
          ' · RSVP\'d ' + new Date(r.created_at).toLocaleDateString() +
          (r.plus_ones && r.plus_ones.length ? ' · +' + r.plus_ones.length + ' guests' : '') +
        '</div>' +
        (r.notes ? '<div class="notes">' + esc(r.notes) + '</div>' : '') +
        (r.dietary_notes ? '<div class="notes" style="color:var(--warn)">Dietary: ' + esc(r.dietary_notes) + '</div>' : '') +
      '</div>' +
      '<div class="actions">' +
        (r.status === 'going' || r.status === 'interested'
          ? '<button class="btn btn-danger" onclick="cancelRsvp(\'' + r.id + '\')">Cancel</button>'
          : '') +
      '</div>' +
    '</div>'
  ).join('');
}

async function cancelRsvp(id) {
  if (!confirm('Cancel this RSVP?')) return;
  const cfg = window.LYMX_CONFIG;
  const session = await window.LYMX.getSession();
  const tok = session.access_token;
  const r = await fetch(cfg.SUPABASE_URL + '/rest/v1/event_rsvps?id=eq.' + id, {
    method:'PATCH',
    headers:{ apikey: cfg.SUPABASE_ANON_KEY, Authorization:'Bearer '+tok, 'Content-Type':'application/json' },
    body: JSON.stringify({ status: 'cancelled' })
  });
  if (!r.ok) { banner('err','Cancel failed.'); return; }
  banner('ok','Cancelled.');
  await load();
}
</script>
</body>
</html>
