<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Schedule · LYMX</title>
<style>
  :root{--ink:#0e1116;--muted:#5b6472;--line:#e6e8ec;--bg:#fff;--bg-soft:#f6f7f9;--accent:#0a84ff;--accent-2:#0050c7;--ok:#13a26b;--warn:#f0a020;--danger:#dc2626;--maxw:780px}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-soft);min-height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--ink);line-height:1.55}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px;width:100%}
  header.nav{background:#fff;border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px;max-width:var(--maxw);margin:0 auto;padding:0 20px}
  .brand{font-weight:800;font-size:18px}
  main{padding:28px 0 60px}
  h1{font-size:24px;font-weight:800;margin:0 0 4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .week-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:0;margin-bottom:18px;overflow:hidden}
  .week-h{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:8px}
  .week-h .title{font-size:17px;font-weight:800}
  .status-pill{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em}
  .status-pill.proposed{background:#fef3c7;color:#78350f}
  .status-pill.accepted{background:#d1fae5;color:#065f46}
  .status-pill.declined{background:#fee2e2;color:#7f1d1d}
  .status-pill.draft{background:#e5e7eb;color:#374151}
  .shifts{padding:6px 22px 12px}
  .shift-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f1f3f6;font-size:14px}
  .shift-row:last-child{border-bottom:0}
  .shift-row .day{font-weight:700;min-width:130px}
  .shift-row .hrs{font-variant-numeric:tabular-nums}
  .shift-row .note{font-size:12px;color:var(--muted);margin-top:2px}
  .shift-row.off{color:var(--muted)}
  .actions{padding:14px 22px;border-top:1px solid var(--line);background:var(--bg-soft);display:flex;gap:10px;flex-wrap:wrap}
  .btn{padding:11px 22px;border-radius:9px;font-weight:700;font-size:14px;border:0;cursor:pointer;font:inherit}
  .btn-accept{background:var(--ok);color:#fff}
  .btn-accept:hover{background:#0f8b5a}
  .btn-decline{background:#fff;border:1.5px solid var(--line);color:var(--ink-2)}
  .btn-decline:hover{border-color:var(--danger);color:var(--danger)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .empty{padding:36px 22px;text-align:center;color:var(--muted);font-size:14px;background:#fff;border:1px solid var(--line);border-radius:14px}
  .empty .ic{font-size:36px;margin-bottom:8px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;z-index:99;opacity:0;transition:opacity .2s}
  .toast.on{opacity:1}
  .toast.ok{background:var(--ok)}
  .toast.err{background:var(--danger)}
  .nav-tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .nav-tabs .tab{padding:10px 14px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
  .nav-tabs .tab.on{color:var(--accent);border-bottom-color:var(--accent)}
</style>
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png" />
</head>
<body data-role-required="staff">

<header class="nav">
  <div class="nav-inner">
    <a href="/" class="brand">LYMX Staff</a>
    <a href="rep-dashboard.html" style="font-size:13px;color:var(--muted)">Dashboard</a>
  </div>
</header>

<main class="wrap">
  <h1 data-i18n="sch.title">My Schedule</h1>
  <p class="sub" data-i18n="sch.sub">Your upcoming weeks. Accept a week to enable Clock In + work tools during those hours.</p>

  <div class="nav-tabs">
    <div class="tab on" data-tab="upcoming" data-i18n="sch.tab_upcoming">Upcoming</div>
    <div class="tab" data-tab="past" data-i18n="sch.tab_past">Past</div>
  </div>

  <div id="weeksList">
    <div class="empty"><div class="ic">⏳</div><span data-i18n="sch.loading">Loading your schedule…</span></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lymx-config.js"></script>
<script src="lymx-auth.js"></script>
<script>
const SUPA = window.LYMX_CONFIG.SUPABASE_URL;
const ANON = window.LYMX_CONFIG.SUPABASE_ANON_KEY;
let myUser = null;
let allWeeks = [];
let allShifts = [];
let currentTab = 'upcoming';

function $(id){return document.getElementById(id);}
function toast(msg, kind){const t=$('toast');t.textContent=msg;t.className='toast on '+(kind||'');setTimeout(()=>t.className='toast',2800);}
function esc(s){return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function t(k, fallback){ try { if (window.LymxI18n) { const v = window.LymxI18n.t(k); if (v && v !== k) return v; } } catch(e) { console.warn('[my-schedule.html:L93] silent error', e); } return fallback; }

async function authedFetch(path, opts) {
  opts = opts || {};
  const s = window.LYMX && window.LYMX.getSession ? await window.LYMX.getSession() : null;
  const tok = (s && s.access_token) || ANON;
  return fetch(SUPA + path, {
    ...opts,
    headers: { 'apikey': ANON, 'Authorization': 'Bearer ' + tok, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
}

function fmtDay(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' });
}
function fmtTime(hms) {
  // hms like "09:00:00" — convert to 9:00 AM display
  if (!hms) return '';
  const [h,m] = hms.split(':').map(Number);
  const d = new Date(); d.setHours(h, m||0, 0, 0);
  return d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
}
function fmtWeekStart(iso) {
  const d = new Date(iso + 'T12:00:00');
  const end = new Date(d.getTime() + 6*24*60*60*1000);
  const sameMonth = d.getMonth() === end.getMonth();
  const startStr = d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  const endStr = end.toLocaleDateString(undefined, sameMonth ? { day:'numeric' } : { month:'short', day:'numeric' });
  return startStr + ' – ' + endStr;
}

function render() {
  const today = new Date().toISOString().slice(0,10);
  const weeks = (currentTab === 'upcoming')
    ? allWeeks.filter(w => w.week_start_date >= subtractDays(today, 7))
    : allWeeks.filter(w => w.week_start_date <  subtractDays(today, 7));

  if (!weeks.length) {
    $('weeksList').innerHTML = '<div class="empty"><div class="ic">📅</div><span>'
      + esc(currentTab === 'upcoming'
          ? t('sch.no_upcoming', 'No upcoming schedule yet. Your manager will publish one soon — you\'ll get an email when it\'s ready.')
          : t('sch.no_past', 'No past schedules.'))
      + '</span></div>';
    return;
  }

  $('weeksList').innerHTML = weeks.map(w => {
    const shifts = allShifts.filter(s => s.week_id === w.id)
      .sort((a,b) => (a.shift_date.localeCompare(b.shift_date) || a.starts_at.localeCompare(b.starts_at)));

    // Build a Mon-Sun grid showing each day
    const startDate = new Date(w.week_start_date + 'T12:00:00');
    const days = [];
    for (let i=0;i<7;i++) {
      const d = new Date(startDate.getTime() + i*24*60*60*1000);
      const dIso = d.toISOString().slice(0,10);
      const dayShifts = shifts.filter(s => s.shift_date === dIso);
      days.push({ iso: dIso, shifts: dayShifts });
    }

    const totalHours = shifts.reduce((sum, s) => {
      const [sh,sm] = s.starts_at.split(':').map(Number);
      const [eh,em] = s.ends_at.split(':').map(Number);
      return sum + ((eh*60+em) - (sh*60+sm)) / 60;
    }, 0);

    return ''
      + '<div class="week-card">'
      +   '<div class="week-h">'
      +     '<div><div class="title">' + esc(fmtWeekStart(w.week_start_date)) + '</div>'
      +       '<div style="font-size:12px;color:#5b6472;margin-top:2px">' + (totalHours.toFixed(1)) + ' ' + esc(t('sch.hours_total','hrs total')) + '</div>'
      +     '</div>'
      +     '<span class="status-pill ' + w.status + '">' + esc(t('sch.status_' + w.status, w.status)) + '</span>'
      +   '</div>'
      +   '<div class="shifts">'
      +     days.map(d => {
            if (!d.shifts.length) {
              return '<div class="shift-row off"><span class="day">' + esc(fmtDay(d.iso)) + '</span><span>' + esc(t('sch.off','— off —')) + '</span></div>';
            }
            return d.shifts.map(s =>
              '<div class="shift-row"><span class="day">' + esc(fmtDay(d.iso)) + '</span>'
              + '<span class="hrs">' + esc(fmtTime(s.starts_at)) + ' – ' + esc(fmtTime(s.ends_at))
              + (s.notes ? '<div class="note">' + esc(s.notes) + '</div>' : '')
              + '</span></div>'
            ).join('');
          }).join('')
      +   '</div>'
      +   (w.status === 'proposed'
          ? '<div class="actions">'
            + '<button class="btn btn-accept" data-action="accept" data-id="' + w.id + '">' + esc(t('sch.accept','✓ Accept this week')) + '</button>'
            + '<button class="btn btn-decline" data-action="decline" data-id="' + w.id + '">' + esc(t('sch.decline','Decline / request changes')) + '</button>'
            + '</div>'
          : w.status === 'accepted'
          ? '<div class="actions" style="background:#d1fae5;color:#065f46;font-size:13px;font-weight:600">✓ ' + esc(t('sch.accepted_msg','Accepted on ')) + esc(new Date(w.accepted_at).toLocaleDateString()) + '</div>'
          : w.status === 'declined'
          ? '<div class="actions" style="background:#fee2e2;color:#7f1d1d;font-size:13px"><strong>' + esc(t('sch.declined_msg','Declined')) + '</strong>' + (w.declined_reason ? ' — ' + esc(w.declined_reason) : '') + '</div>'
          : '')
      + '</div>';
  }).join('');

  // Wire accept/decline buttons
  document.querySelectorAll('button[data-action]').forEach(btn => {
    btn.addEventListener('click', () => handleAction(btn.dataset.action, btn.dataset.id));
  });
}

function subtractDays(iso, n) {
  const d = new Date(iso + 'T12:00:00');
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0,10);
}

async function handleAction(action, weekId) {
  if (action === 'decline') {
    const reason = prompt(t('sch.decline_prompt','Why are you declining? (optional)'));
    if (reason === null) return; // user cancelled
    const r = await authedFetch('/rest/v1/schedule_weeks?id=eq.' + weekId, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'declined', declined_at: new Date().toISOString(), declined_reason: reason || null })
    });
    if (!r.ok) { toast('Decline failed','err'); return; }
    toast(t('sch.declined_toast','Declined — admin will be notified'),'ok');
  } else if (action === 'accept') {
    const r = await authedFetch('/rest/v1/schedule_weeks?id=eq.' + weekId, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'accepted', accepted_at: new Date().toISOString() })
    });
    if (!r.ok) { toast('Accept failed','err'); return; }
    toast(t('sch.accepted_toast','✓ Week accepted — Clock In is now enabled for these hours'),'ok');
  }
  await load();
}

async function load() {
  const wr = await authedFetch('/rest/v1/schedule_weeks?user_id=eq.' + myUser.id + '&select=id,week_start_date,status,proposed_at,accepted_at,declined_at,declined_reason,notes&order=week_start_date.desc&limit=20');
  if (!wr.ok) { $('weeksList').innerHTML = '<div class="empty"><div class="ic">⚠</div>Could not load schedule.</div>'; return; }
  allWeeks = await wr.json();

  if (!allWeeks.length) { render(); return; }

  const weekIds = allWeeks.map(w => w.id);
  const sr = await authedFetch('/rest/v1/schedule_shifts?week_id=in.(' + encodeURIComponent(weekIds.join(',')) + ')&select=id,week_id,shift_date,starts_at,ends_at,notes&order=shift_date.asc');
  if (sr.ok) allShifts = await sr.json();
  render();
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    currentTab = t.dataset.tab;
    render();
  });
});

(async function init(){
  const s = window.LYMX && window.LYMX.getSession ? await window.LYMX.getSession() : null;
  if (!s) { location.href = '/login.html?next=/my-schedule.html'; return; }
  myUser = s.user;
  await load();
})();
</script>
<script src="lymx-i18n.js" defer></script>
<script src="lymx-feedback.js" defer></script>
<script src="lymx-sidebar.js" defer></script>
<script src="lymx-app.js" defer></script>
<script src="lymx-role-gate.js" defer></script>
</body>
</html>
