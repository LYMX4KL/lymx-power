<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Recruited Reviews &middot; LYMX Partner</title>
<link rel="icon" type="image/png" href="favicon.png" />
<style>
  :root{--ink:#0e1116;--ink-2:#1a1f27;--mute:#5b6472;--line:#e6e8ec;--bg:#f6f7f9;--card:#fff;--accent:#0a84ff;--ok:#13a26b;--gold:#d4af37;--err:#b81324}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55}
  .wrap{max-width:980px;margin:0 auto;padding:28px 22px 80px}
  h1{margin:0 0 4px;font-size:26px;font-weight:800;letter-spacing:-.01em}
  .lede{color:var(--mute);font-size:14.5px;margin-bottom:18px}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 16px}
  .stat .lbl{font-size:11px;color:var(--mute);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .stat .val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
  .stat .val.gold{color:var(--gold)}
  .biz-section{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
  .biz-header{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .biz-name{font-weight:800;font-size:16px}
  .biz-name a{color:var(--ink);text-decoration:none}
  .biz-name a:hover{color:var(--accent)}
  .biz-meta{font-size:12.5px;color:var(--mute);font-variant-numeric:tabular-nums}
  .review{border-top:1px solid var(--line);padding:11px 0;display:flex;gap:12px;align-items:flex-start}
  .review .stars{font-size:14px;color:var(--gold);flex-shrink:0;letter-spacing:1px;font-weight:700;min-width:80px}
  .review .body{font-size:14px;color:var(--ink-2);line-height:1.6;flex:1}
  .review .when{font-size:12px;color:var(--mute);margin-top:4px}
  .empty{padding:40px 20px;text-align:center;color:var(--mute);background:var(--card);border:1px dashed var(--line);border-radius:12px}
</style>
</head>
<body data-page="partner-my-reviews" data-role-required="partner" data-playbook-slug="partner-my-network">

<script src="lymx-config.js"></script>
<script src="lymx-sidebar.js" defer></script>
<script src="lymx-feedback.js" defer></script>
<script src="lymx-app.js" defer></script>
<script src="lymx-playbook-help.js" defer></script>

<div class="wrap">
  <h1>Reviews on businesses you recruited</h1>
  <p class="lede">Every review left on a business that signed up through you. The more reviews flow in, the more your recruited businesses retain customers &mdash; and the more your commission rolls forward.</p>

  <div class="summary" id="summary">
    <div class="stat"><div class="lbl">Recruited businesses</div><div class="val" id="statBizCount">&mdash;</div></div>
    <div class="stat"><div class="lbl">Total reviews</div><div class="val" id="statReviewCount">&mdash;</div></div>
    <div class="stat"><div class="lbl">Avg rating</div><div class="val gold" id="statAvgRating">&mdash;</div></div>
  </div>

  <div id="list"><div class="empty">Loading&hellip;</div></div>
</div>

<script>
(async function () {
  // 2026-05-30 (S2a) - outer try/catch so an unexpected throw fails VISIBLY instead
  // of leaving the spinner stuck forever ("My ... stuck on Loading").
  try {
  while (!window.LYMX_CONFIG || !window.LYMX || !window.LYMX.getSession) await new Promise(function (r) { setTimeout(r, 100); });
  var ANON = window.LYMX_CONFIG.SUPABASE_ANON_KEY;
  var URL_ = window.LYMX_CONFIG.SUPABASE_URL;
  var session = await window.LYMX.getSession();
  if (!session) { location.href = "login.html?return=partner-my-reviews.html"; return; }
  var H = { apikey: ANON, Authorization: "Bearer " + session.access_token, "Content-Type": "application/json" };

  var listEl = document.getElementById("list");

  function escHtml(s) { return (s || "").replace(/[<>&]/g, function (c) { return { "<":"&lt;", ">":"&gt;", "&":"&amp;" }[c]; }); }
  function stars(n) { var full = "★".repeat(n); var empty = "☆".repeat(5 - n); return full + empty; }
  function whenFmt(iso) { return new Date(iso).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }); }

  // Resolve my partner row
  var pr = await fetch(URL_ + "/rest/v1/partners?user_id=eq." + session.user.id + "&select=id&limit=1", { headers: H });
  if (!pr.ok) { listEl.innerHTML = '<div class="empty">Could not load your partner record.</div>'; return; }
  var pRows = await pr.json();
  if (!Array.isArray(pRows) || !pRows.length) {
    listEl.innerHTML = '<div class="empty">You don\'t have a partner account. <a href="partner-signup.html">Apply here</a>.</div>';
    return;
  }
  var partnerId = pRows[0].id;

  // Recruited businesses
  var br = await fetch(URL_ + "/rest/v1/businesses?signed_up_by_partner_id=eq." + partnerId + "&select=id,display_name,slug,verified_at&order=display_name.asc", { headers: H });
  if (!br.ok) { listEl.innerHTML = '<div class="empty">Could not load your recruited businesses.</div>'; return; }
  var bizRows = await br.json();
  document.getElementById("statBizCount").textContent = bizRows.length;

  if (!bizRows.length) {
    listEl.innerHTML = '<div class="empty">No businesses recruited yet. When a business activates through your link, every review on them will show up here.</div>';
    document.getElementById("statReviewCount").textContent = "0";
    document.getElementById("statAvgRating").textContent = "—";
    return;
  }

  // Pull all reviews for the recruited businesses (matched by slug)
  var slugs = bizRows.map(function (b) { return b.slug; }).filter(Boolean);
  if (!slugs.length) {
    listEl.innerHTML = '<div class="empty">Your recruited businesses don\'t have public slugs yet.</div>';
    return;
  }
  var rr = await fetch(URL_ + "/rest/v1/reviews?business_slug=in.(" + slugs.map(encodeURIComponent).join(",") + ")&select=id,business_slug,business_name,rating,body,has_photo,created_at,reviewer_user_id&order=created_at.desc&limit=500", { headers: H });
  var reviewRows = rr.ok ? await rr.json() : [];

  document.getElementById("statReviewCount").textContent = reviewRows.length;
  if (reviewRows.length) {
    var avg = reviewRows.reduce(function (s, r) { return s + (r.rating || 0); }, 0) / reviewRows.length;
    document.getElementById("statAvgRating").textContent = avg.toFixed(1);
  } else {
    document.getElementById("statAvgRating").textContent = "—";
  }

  // Group reviews by business slug
  var bySlug = {};
  reviewRows.forEach(function (r) {
    if (!bySlug[r.business_slug]) bySlug[r.business_slug] = [];
    bySlug[r.business_slug].push(r);
  });

  // Render each business with its reviews underneath
  listEl.innerHTML = bizRows.map(function (b) {
    var reviews = bySlug[b.slug] || [];
    var reviewsHtml = reviews.length
      ? reviews.map(function (r) {
          return '<div class="review">'
            + '<div class="stars">' + stars(r.rating) + '</div>'
            + '<div class="body">' + escHtml(r.body) + '<div class="when">' + whenFmt(r.created_at) + (r.has_photo ? ' &middot; \u{1F4F8} photo' : '') + '</div></div>'
            + '</div>';
        }).join("")
      : '<div style="font-size:13px;color:var(--mute);padding:8px 0">No reviews yet on this business.</div>';
    var avg = reviews.length ? (reviews.reduce(function (s, r) { return s + r.rating; }, 0) / reviews.length).toFixed(1) : "—";
    var verifiedBadge = b.verified_at ? ' \u{1F6E1}' : '';
    return '<div class="biz-section">'
      + '<div class="biz-header">'
      +   '<div class="biz-name"><a href="/biz-' + encodeURIComponent(b.slug) + '.html">' + escHtml(b.display_name) + verifiedBadge + '</a></div>'
      +   '<div class="biz-meta">' + reviews.length + ' review' + (reviews.length === 1 ? '' : 's') + ' &middot; avg ' + avg + '</div>'
      + '</div>'
      + reviewsHtml
      + '</div>';
  }).join("");
  } catch (e) {
    console.warn("[partner-my-reviews] load failed", e);
    var le = document.getElementById("list");
    if (le) le.innerHTML = '<div class="empty">Couldn\'t load your reviews right now. Please refresh \u2014 if it keeps happening, let us know.</div>';
  }
})();
</script>

<script src="lymx-role-gate.js" defer></script>
</body>
</html>
