<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0" />
<meta name="description" content="Your LYMX activity grouped by Business. See where you earned and where you spent — with a favorite-Business breakdown." />
<meta name="robots" content="noindex,nofollow" />
<title>My history · LYMX Wallet</title>
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" href="favicon.png" />
<style>
  :root{--ink:#0e1116;--ink-2:#1a1f27;--muted:#5b6472;--line:#e6e8ec;--bg:#ffffff;--bg-soft:#f6f7f9;--accent:#0a84ff;--accent-2:#0050c7;--ok:#13a26b;--warn:#f0a020;--danger:#e0413e;--gold:#d4af37;--radius:14px}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-soft)}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:80px}
  a{color:inherit;text-decoration:none}

  /* Top nav */
  .top{padding:14px 18px 12px;display:flex;align-items:center;gap:12px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  .back{width:36px;height:36px;border-radius:50%;background:var(--bg-soft);border:0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);text-decoration:none}
  .back:hover{background:var(--line)}
  .top h1{margin:0;font-size:17px;font-weight:800;flex:1}
  .top .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#a01644,#6e0e2f);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}

  /* Time filter */
  .time-filter{display:flex;gap:6px;padding:14px 18px 6px;overflow-x:auto}
  .time-pill{padding:7px 14px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;font-weight:700;color:var(--ink-2);cursor:pointer;background:#fff;white-space:nowrap;flex-shrink:0}
  .time-pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* Summary card */
  .summary{margin:8px 18px 14px;background:linear-gradient(135deg,#0a84ff,#0050c7);color:#fff;border-radius:16px;padding:18px 20px;position:relative;overflow:hidden}
  .summary::after{content:"";position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(245,209,114,.18),transparent 70%);right:-80px;top:-80px;pointer-events:none}
  .summary .row{display:flex;justify-content:space-between;align-items:flex-end;position:relative}
  .summary .col{flex:1}
  .summary .lab{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#a3c5ff;margin-bottom:5px}
  .summary .v{font-size:24px;font-weight:800;letter-spacing:-.01em;color:#fff;line-height:1}
  .summary .v.green{color:#5fd198}
  .summary .v.gold{color:#f5d172}
  .summary .v .unit{font-size:11px;color:#a3c5ff;margin-left:3px;font-weight:700}
  .summary .vsub{font-size:11px;color:#a3c5ff;margin-top:3px}
  .summary .divider{width:1px;background:rgba(255,255,255,.18);margin:0 14px;align-self:stretch}

  /* Net bar */
  .net-bar{margin-top:14px;height:7px;background:rgba(255,255,255,.16);border-radius:5px;overflow:hidden;display:flex;position:relative}
  .net-bar .earned{background:#5fd198;height:100%}
  .net-bar .spent{background:#f5d172;height:100%}
  .net-legend{display:flex;justify-content:space-between;font-size:10.5px;color:#a3c5ff;margin-top:5px;position:relative}
  .net-legend .leg{display:flex;align-items:center;gap:5px}
  .net-legend .dot{width:7px;height:7px;border-radius:50%}
  .net-legend .dot.g{background:#5fd198}
  .net-legend .dot.y{background:#f5d172}

  /* Favorite Business */
  .fav{margin:0 18px 14px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px}
  .fav .ic{width:46px;height:46px;border-radius:11px;background:linear-gradient(135deg,#d4af37,#a08020);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .fav .body{flex:1;min-width:0}
  .fav .lab{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--gold)}
  .fav .name{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .fav .meta{font-size:12px;color:var(--muted);margin-top:2px}

  /* Top Businesses chart */
  .section{margin:18px 18px 0}
  .section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .section-h h2{margin:0;font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .section-h .toggle{display:flex;gap:4px;background:var(--bg-soft);border-radius:7px;padding:2px}
  .section-h .toggle button{border:0;padding:5px 11px;font-size:11.5px;font-weight:800;color:var(--muted);background:transparent;border-radius:5px;cursor:pointer}
  .section-h .toggle button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(14,17,22,.1)}

  .biz-row{background:#fff;border-radius:11px;padding:13px 14px;margin-bottom:6px;border:1px solid var(--line);display:flex;align-items:center;gap:12px;cursor:pointer;transition:.1s}
  .biz-row:hover{border-color:var(--ink)}
  .biz-row .av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0}
  .biz-row .body{flex:1;min-width:0}
  .biz-row .name{font-size:14px;font-weight:800;line-height:1.2}
  .biz-row .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .biz-row .bar-wrap{margin-top:6px;height:5px;background:var(--bg-soft);border-radius:3px;overflow:hidden;position:relative}
  .biz-row .bar-wrap > div{height:100%;border-radius:3px}
  .biz-row .v{font-size:14px;font-weight:800;text-align:right;flex-shrink:0;min-width:60px}
  .biz-row .v.green{color:var(--ok)}
  .biz-row .v.amber{color:#a06808}

  /* Recent transactions */
  .tx-list{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:10px}
  .tx-row{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .tx-row:last-child{border-bottom:0}
  .tx-row .ic{width:32px;height:32px;border-radius:50%;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .tx-row .ic.earn{background:rgba(19,162,107,.15);color:#0d7d51}
  .tx-row .ic.spend{background:rgba(240,160,32,.16);color:#7a4d0a}
  .tx-row .body{flex:1;min-width:0}
  .tx-row .body .who{font-size:13.5px;font-weight:800;line-height:1.2}
  .tx-row .body .when{font-size:11.5px;color:var(--muted);margin-top:2px}
  .tx-row .amt{font-size:13.5px;font-weight:800;text-align:right}
  .tx-row .amt.earn{color:var(--ok)}
  .tx-row .amt.spend{color:var(--ink-2)}

  /* Bottom nav (matches customer-wallet) */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;border-top:1px solid var(--line);padding:8px 0 14px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;text-align:center;z-index:10}
  .bn{font-size:11px;color:var(--muted);font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;text-decoration:none}
  .bn .ic{font-size:22px}
  .bn.on{color:var(--accent)}

  /* Empty */
  .empty{padding:30px 14px;text-align:center;color:var(--muted);font-size:13.5px}
</style>
</head>
<body>
<div class="top">
  <a class="back" href="customer-wallet.html">←</a>
  <h1>My LYMX history</h1>
  <div class="av">MH</div>
</div>

<!-- Time filter -->
<div class="time-filter" id="time-filter">
  <div class="time-pill" data-t="month">This month</div>
  <div class="time-pill" data-t="3mo">Last 3 mo</div>
  <div class="time-pill on" data-t="all">All time</div>
</div>

<!-- Summary card -->
<div class="summary">
  <div class="row">
    <div class="col">
      <div class="lab">Earned</div>
      <div class="v green" id="earned-v">—<span class="unit">LYMX</span></div>
      <div class="vsub" id="earned-vsub">—</div>
    </div>
    <div class="divider"></div>
    <div class="col">
      <div class="lab">Spent</div>
      <div class="v gold" id="spent-v">—<span class="unit">LYMX</span></div>
      <div class="vsub" id="spent-vsub">—</div>
    </div>
    <div class="divider"></div>
    <div class="col">
      <div class="lab">Current balance</div>
      <div class="v" id="bal-v">—<span class="unit">LYMX</span></div>
      <div class="vsub">≈ $<span id="bal-usd">—</span> spending power</div>
    </div>
  </div>
  <div class="net-bar">
    <div class="earned" id="net-earned" style="width:0"></div>
    <div class="spent" id="net-spent" style="width:0"></div>
  </div>
  <div class="net-legend">
    <span class="leg"><span class="dot g"></span><span id="net-pct-earn">— earned</span></span>
    <span class="leg"><span class="dot y"></span><span id="net-pct-spend">— spent</span></span>
  </div>
</div>

<!-- Favorite Business -->
<div class="fav" id="fav-card" style="display:none">
  <div class="ic">⭐</div>
  <div class="body">
    <div class="lab">Your top Business</div>
    <div class="name" id="fav-name">—</div>
    <div class="meta" id="fav-meta">—</div>
  </div>
</div>

<!-- Top Businesses by activity -->
<div class="section">
  <div class="section-h">
    <h2>Where I've been</h2>
    <div class="toggle" id="biz-toggle">
      <button class="on" data-mode="combined">Combined</button>
      <button data-mode="earned">Earned</button>
      <button data-mode="spent">Spent</button>
    </div>
  </div>
  <div id="biz-list"></div>
</div>

<!-- Recent transactions -->
<div class="section">
  <div class="section-h">
    <h2>Recent activity</h2>
    <a href="customer-dashboard.html" style="font-size:12px;font-weight:700;color:var(--accent-2);text-decoration:none">See all →</a>
  </div>
  <div class="tx-list" id="tx-list"></div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <a class="bn on" href="customer-wallet.html"><div class="ic">💳</div>Wallet</a>
  <a class="bn" href="browse.html"><div class="ic">🔍</div>Discover</a>
  <a class="bn" href="customer-referral.html"><div class="ic">🎁</div>Refer</a>
  <a class="bn" href="notifications.html"><div class="ic">📬</div>Inbox</a>
</div>

<script>
  // Mock transaction data — covers ~5 months for richer time filtering
  const TXS = [
    // April 2026
    {date:'2026-04-28',biz:'Brew & Bean',cat:'café',type:'earn',amt:140},
    {date:'2026-04-26',biz:'Brew & Bean',cat:'café',type:'spend',amt:200},
    {date:'2026-04-25',biz:'Oakline Kitchen',cat:'restaurant',type:'earn',amt:520},
    {date:'2026-04-22',biz:'Sage & Stone Bakery',cat:'bakery',type:'earn',amt:90},
    {date:'2026-04-20',biz:'Two Birds Café',cat:'café',type:'earn',amt:150},
    {date:'2026-04-19',biz:'Brew & Bean',cat:'café',type:'earn',amt:160},
    {date:'2026-04-15',biz:'Pulse Studio',cat:'fitness',type:'earn',amt:300},
    {date:'2026-04-12',biz:'Pink Note Co',cat:'retail',type:'spend',amt:1100},
    {date:'2026-04-10',biz:'Oakline Kitchen',cat:'restaurant',type:'earn',amt:340},
    {date:'2026-04-08',biz:'Brew & Bean',cat:'café',type:'earn',amt:140},
    {date:'2026-04-05',biz:'Sunlit Salon Studio',cat:'salon',type:'earn',amt:850},
    {date:'2026-04-02',biz:'Brew & Bean',cat:'café',type:'spend',amt:380},

    // March 2026
    {date:'2026-03-28',biz:'Oakline Kitchen',cat:'restaurant',type:'earn',amt:480},
    {date:'2026-03-25',biz:'Brew & Bean',cat:'café',type:'earn',amt:130},
    {date:'2026-03-22',biz:'Pulse Studio',cat:'fitness',type:'earn',amt:300},
    {date:'2026-03-20',biz:'Brew & Bean',cat:'café',type:'spend',amt:240},
    {date:'2026-03-16',biz:'Two Birds Café',cat:'café',type:'earn',amt:160},
    {date:'2026-03-12',biz:'Yumi Sushi',cat:'restaurant',type:'earn',amt:620},
    {date:'2026-03-08',biz:'Brew & Bean',cat:'café',type:'earn',amt:140},
    {date:'2026-03-04',biz:'Lavender & Sage',cat:'gift shop',type:'spend',amt:680},

    // February 2026
    {date:'2026-02-26',biz:'Brew & Bean',cat:'café',type:'earn',amt:140},
    {date:'2026-02-22',biz:'Oakline Kitchen',cat:'restaurant',type:'earn',amt:380},
    {date:'2026-02-18',biz:'Brew & Bean',cat:'café',type:'spend',amt:300},
    {date:'2026-02-14',biz:'Sunlit Salon Studio',cat:'salon',type:'earn',amt:920},
    {date:'2026-02-10',biz:'Brew & Bean',cat:'café',type:'earn',amt:150},
    {date:'2026-02-06',biz:'Yumi Sushi',cat:'restaurant',type:'earn',amt:540},

    // January 2026
    {date:'2026-01-28',biz:'Brew & Bean',cat:'café',type:'earn',amt:140},
    {date:'2026-01-22',biz:'Pulse Studio',cat:'fitness',type:'earn',amt:300},
    {date:'2026-01-15',biz:'Two Birds Café',cat:'café',type:'spend',amt:280},
    {date:'2026-01-10',biz:'Welcome bonus',cat:'system',type:'earn',amt:100}
  ];

  const CATEGORY_COLOR = {
    'café':'#a01644','restaurant':'#c4742d','bakery':'#7a5e10','fitness':'#0d7d51',
    'retail':'#7426c4','salon':'#a01644','gift shop':'#a06808','system':'#5b6472'
  };

  let timeFilter = 'all';
  let bizMode = 'combined';
  const TODAY = new Date('2026-04-29');

  function txInRange(tx){
    if(timeFilter === 'all') return true;
    const d = new Date(tx.date+'T00:00:00');
    if(timeFilter === 'month'){
      return d.getFullYear()===TODAY.getFullYear() && d.getMonth()===TODAY.getMonth();
    }
    if(timeFilter === '3mo'){
      const cutoff = new Date(TODAY.getFullYear(), TODAY.getMonth()-2, 1);
      return d >= cutoff;
    }
    return true;
  }

  function initials(name){
    return name.split(/\s+/).filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase();
  }

  function fmt(n){ return n.toLocaleString(); }

  function timeAgo(dateStr){
    const d = new Date(dateStr+'T00:00:00');
    const diff = Math.round((TODAY - d)/(1000*60*60*24));
    if(diff === 0) return 'Today';
    if(diff === 1) return 'Yesterday';
    if(diff < 7) return diff + ' days ago';
    if(diff < 30) return Math.floor(diff/7) + 'w ago';
    if(diff < 365) return Math.floor(diff/30) + 'mo ago';
    return Math.floor(diff/365) + 'y ago';
  }

  function render(){
    const filtered = TXS.filter(txInRange);
    const earned = filtered.filter(t=>t.type==='earn').reduce((a,b)=>a+b.amt,0);
    const spent = filtered.filter(t=>t.type==='spend').reduce((a,b)=>a+b.amt,0);
    const balance = earned - spent + 4150; // imaginary running starting bal
    const total = earned + spent || 1;

    document.getElementById('earned-v').firstChild.nodeValue = fmt(earned);
    document.getElementById('spent-v').firstChild.nodeValue = fmt(spent);
    document.getElementById('bal-v').firstChild.nodeValue = fmt(balance);
    document.getElementById('bal-usd').textContent = (balance*0.01).toFixed(2);

    const earnPct = (earned/total)*100;
    const spendPct = (spent/total)*100;
    document.getElementById('net-earned').style.width = earnPct+'%';
    document.getElementById('net-spent').style.width = spendPct+'%';
    document.getElementById('net-pct-earn').textContent = Math.round(earnPct) + '% earned';
    document.getElementById('net-pct-spend').textContent = Math.round(spendPct) + '% spent';

    // Earned/spent sub-text by visit count
    const earnVisits = filtered.filter(t=>t.type==='earn').length;
    const spendVisits = filtered.filter(t=>t.type==='spend').length;
    document.getElementById('earned-vsub').textContent = earnVisits + ' visits';
    document.getElementById('spent-vsub').textContent = spendVisits + ' redemption' + (spendVisits===1?'':'s');

    // Per-Business aggregation (excluding system)
    const byBiz = {};
    filtered.forEach(tx=>{
      if(tx.cat === 'system') return;
      if(!byBiz[tx.biz]) byBiz[tx.biz] = {biz:tx.biz, cat:tx.cat, earned:0, spent:0, visits:0};
      byBiz[tx.biz][tx.type === 'earn' ? 'earned' : 'spent'] += tx.amt;
      byBiz[tx.biz].visits++;
    });
    const bizArr = Object.values(byBiz);

    // Favorite = biz with most visits
    const fav = bizArr.length ? bizArr.slice().sort((a,b)=>b.visits-a.visits)[0] : null;
    if(fav){
      document.getElementById('fav-card').style.display = 'flex';
      document.getElementById('fav-name').textContent = fav.biz;
      document.getElementById('fav-meta').textContent = fav.visits + ' visits · ' + fmt(fav.earned) + ' earned · ' + fmt(fav.spent) + ' spent';
    } else {
      document.getElementById('fav-card').style.display = 'none';
    }

    // Sort by mode + render
    bizArr.sort((a,b)=>{
      if(bizMode === 'earned') return b.earned - a.earned;
      if(bizMode === 'spent') return b.spent - a.spent;
      return (b.earned + b.spent) - (a.earned + a.spent);
    });
    const max = bizArr[0] ? Math.max(1, bizMode === 'earned' ? bizArr[0].earned : bizMode === 'spent' ? bizArr[0].spent : (bizArr[0].earned + bizArr[0].spent)) : 1;
    const list = document.getElementById('biz-list');
    if(bizArr.length === 0){
      list.innerHTML = '<div class="empty">No activity in this window. <a href="browse.html" style="color:var(--accent-2);font-weight:700">Find a Business →</a></div>';
    } else {
      list.innerHTML = bizArr.slice(0,10).map(b=>{
        const showVal = bizMode === 'earned' ? b.earned : bizMode === 'spent' ? b.spent : (b.earned + b.spent);
        const pct = (showVal / max) * 100;
        const cls = bizMode === 'spent' ? 'amber' : 'green';
        const barColor = bizMode === 'spent' ? '#f0a020' : bizMode === 'earned' ? '#13a26b' : 'linear-gradient(90deg,#13a26b,#f0a020)';
        const initials_str = initials(b.biz);
        const avBg = CATEGORY_COLOR[b.cat] || '#5b6472';
        return `<div class="biz-row" onclick="location.href='browse.html'">
          <div class="av" style="background:${avBg}">${initials_str}</div>
          <div class="body">
            <div class="name">${b.biz}</div>
            <div class="meta">${b.cat} · ${b.visits} visit${b.visits===1?'':'s'} · earned ${fmt(b.earned)}, spent ${fmt(b.spent)}</div>
            <div class="bar-wrap"><div style="width:${pct}%;background:${barColor}"></div></div>
          </div>
          <div class="v ${cls}">${fmt(showVal)}</div>
        </div>`;
      }).join('');
    }

    // Recent tx list (last 8)
    const recent = filtered.slice(0,8);
    const txList = document.getElementById('tx-list');
    if(recent.length === 0){
      txList.innerHTML = '<div class="empty">No transactions in this window.</div>';
    } else {
      txList.innerHTML = recent.map(t=>{
        const isEarn = t.type === 'earn';
        return `<div class="tx-row">
          <div class="ic ${isEarn?'earn':'spend'}">${isEarn?'+':'−'}</div>
          <div class="body">
            <div class="who">${t.biz}</div>
            <div class="when">${timeAgo(t.date)} · ${t.cat}</div>
          </div>
          <div class="amt ${isEarn?'earn':'spend'}">${isEarn?'+':''}${fmt(t.amt)} LYMX</div>
        </div>`;
      }).join('');
    }
  }

  // Time-filter pills
  document.querySelectorAll('#time-filter .time-pill').forEach(p=>{
    p.onclick = ()=>{
      document.querySelectorAll('#time-filter .time-pill').forEach(x=>x.classList.remove('on'));
      p.classList.add('on');
      timeFilter = p.dataset.t;
      render();
    };
  });

  // Biz-mode toggle
  document.querySelectorAll('#biz-toggle button').forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll('#biz-toggle button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      bizMode = b.dataset.mode;
      render();
    };
  });

  render();
</script>
</body>
</html>
