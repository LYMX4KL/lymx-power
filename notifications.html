<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="LYMX notifications — earn confirmations, redemption receipts, promo alerts, referral updates." />
<title>Notifications · LYMX</title>
<meta property="og:type" content="website" />
<meta property="og:url" content="https://getlymx.com/notifications" />
<meta property="og:title" content="LYMX Notifications" />
<meta property="og:description" content="Your LYMX activity feed." />
<meta property="og:image" content="https://getlymx.com/og-image.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:site_name" content="LYMX" />
<meta name="twitter:card" content="summary_large_image" />
<style>
  :root{--ink:#0e1116;--ink-2:#1a1f27;--muted:#5b6472;--line:#e6e8ec;--bg:#ffffff;--bg-soft:#f6f7f9;--accent:#0a84ff;--accent-2:#0050c7;--ok:#13a26b;--warn:#f0a020;--gold:#d4af37;--radius:18px;--shadow:0 14px 40px rgba(14,17,22,.12)}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-soft)}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  .device{max-width:430px;margin:32px auto;background:#fff;border-radius:32px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--line);min-height:780px;display:flex;flex-direction:column}
  @media(max-width:480px){.device{margin:0;border-radius:0;border:0;min-height:100vh}}

  .status-bar{display:flex;justify-content:space-between;padding:14px 22px 6px;font-size:13px;color:var(--ink);font-weight:700}
  .status-bar .icons{display:flex;gap:6px;font-size:12px;color:var(--muted)}

  /* Top */
  .top{padding:8px 22px 14px;display:flex;align-items:center;gap:12px}
  .back{background:transparent;border:0;font-size:20px;color:var(--ink);cursor:pointer;padding:0;font-family:inherit;text-decoration:none}
  .top h1{margin:0;font-size:20px;font-weight:800;flex:1}
  .top .mark{font-size:12.5px;color:var(--accent-2);font-weight:700;cursor:pointer;background:transparent;border:0;font-family:inherit;padding:4px 8px}

  /* Filter chips */
  .filter-row{display:flex;gap:6px;padding:0 22px 14px;overflow-x:auto;scroll-snap-type:x mandatory}
  .filter-row::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0;padding:7px 14px;border:1px solid var(--line);border-radius:99px;font-size:12.5px;font-weight:700;color:var(--muted);background:#fff;cursor:pointer;font-family:inherit;scroll-snap-align:start}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .ct{display:inline-block;background:rgba(255,255,255,.18);color:inherit;font-size:11px;font-weight:800;padding:1px 6px;border-radius:5px;margin-left:5px}
  .chip:not(.on) .ct{background:var(--bg-soft);color:var(--muted)}

  /* Notif list */
  .feed{flex:1;overflow-y:auto;padding:0 0 18px}
  .day-h{padding:12px 22px 6px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;background:var(--bg-soft);border-bottom:1px solid var(--line)}

  .notif{display:flex;align-items:flex-start;gap:12px;padding:14px 22px;border-bottom:1px solid var(--line);cursor:pointer;transition:.1s;position:relative}
  .notif:hover{background:var(--bg-soft)}
  .notif.unread{background:rgba(10,132,255,.04)}
  .notif.unread::before{content:"";position:absolute;left:8px;top:50%;width:6px;height:6px;background:var(--accent);border-radius:50%;transform:translateY(-50%)}
  .notif .ic{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex-shrink:0}
  .notif .ic.earn{background:linear-gradient(135deg,#13a26b,#0d7d51)}
  .notif .ic.spend{background:linear-gradient(135deg,#5b6472,#3a4250)}
  .notif .ic.promo{background:linear-gradient(135deg,#d4af37,#b88a2e)}
  .notif .ic.referral{background:linear-gradient(135deg,#0a84ff,#0050c7)}
  .notif .ic.system{background:linear-gradient(135deg,#a01644,#6e0e2f)}
  .notif .body{flex:1;min-width:0}
  .notif .body .h{font-weight:800;font-size:13.5px;letter-spacing:-.005em;line-height:1.4}
  .notif .body .d{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.5}
  .notif .body .t{font-size:11.5px;color:var(--muted);margin-top:5px;font-weight:600}
  .notif .v{font-weight:800;font-size:13.5px;text-align:right;flex-shrink:0;white-space:nowrap;margin-top:2px}
  .notif .v.green{color:var(--ok)}
  .notif .v.gold{color:var(--gold)}
  .notif .v.muted{color:var(--muted);font-weight:700}

  .notif.cta{background:rgba(212,175,55,.06);border-left:3px solid var(--gold)}
  .notif.cta .body .h{color:#86670c}

  /* Empty */
  .empty{padding:48px 24px;text-align:center;color:var(--muted)}
  .empty .ic{font-size:42px;margin-bottom:8px;opacity:.6}

  /* Bottom nav */
  .botnav{background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:8px 0 14px;flex-shrink:0}
  .botnav a{text-align:center;padding:6px 0;font-size:11px;color:var(--muted);font-weight:700;position:relative}
  .botnav a.on{color:var(--accent-2)}
  .botnav a .b{font-size:18px;display:block;margin-bottom:1px}
  .botnav a .badge{position:absolute;top:2px;right:30%;width:7px;height:7px;background:var(--danger,#e0413e);border-radius:50%}
</style>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<meta name="theme-color" content="#0a84ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="LYMX" />
<meta name="mobile-web-app-capable" content="yes" />
</head>
<body>

<div class="device">
  <div class="top">
    <a class="back" href="customer-wallet.html">‹</a>
    <h1>Notifications</h1>
    <button class="mark" id="markAllReadBtn" onclick="markAllRead()">Mark all read</button>
  </div>

  <div class="filter-row" id="filter-row">
    <button class="chip on" data-f="all" onclick="setFilter('all', this)">All <span class="ct" id="ct-all">8</span></button>
    <button class="chip" data-f="unread" onclick="setFilter('unread', this)">Unread <span class="ct" id="ct-unread">4</span></button>
    <button class="chip" data-f="earn" onclick="setFilter('earn', this)">Earned</button>
    <button class="chip" data-f="spend" onclick="setFilter('spend', this)">Spent</button>
    <button class="chip" data-f="promo" onclick="setFilter('promo', this)">Promos</button>
    <button class="chip" data-f="referral" onclick="setFilter('referral', this)">Referrals</button>
    <button class="chip" data-f="system" onclick="setFilter('system', this)">System</button>
  </div>

  <div class="feed" id="feed"></div>

  <nav class="botnav">
    <a href="customer-wallet.html"><span class="b">⬢</span>Wallet</a>
    <a href="browse.html"><span class="b">⌕</span>Discover</a>
    <a href="customer-referral.html"><span class="b">🎁</span>Refer</a>
    <a href="notifications.html" class="on"><span class="b">🔔</span>Inbox</a>
  </nav>
</div>

<script>
  // Notifications data — populated from real DB by loadNotificationsFromDb() below.
  // Mock array wrapped 2026-05-18 so customers don't see fake Brew & Bean push.
  let notifications = [];
  /* legacy-mock-disabled
    { id:1, type:'promo', day:'Today', time:'8:14 AM', title:'2× LYMX active at Brew & Bean Coffee', desc:'Happy Hour multiplier · until 6:00 PM. Earn 10 LYMX per $1 instead of 5.',  cta:'Brew & Bean is 0.2 mi from you', unread:true,  v:'2× boost', vClass:'gold' },
    { id:2, type:'earn',  day:'Today', time:'7:42 AM', title:'You earned 1,200 LYMX',                desc:'Brew & Bean Coffee · Latte + scone',                                                          unread:true,  v:'+1,200',   vClass:'green' },
    { id:3, type:'referral', day:'Today', time:'7:15 AM', title:'Emma joined LYMX!',                  desc:'She used your code SARAH-7K9F. You’ll get 200 LYMX when she makes her first purchase.', unread:true,  v:'+0 LYMX',  vClass:'muted' },

    { id:4, type:'system', day:'Yesterday', time:'9:32 PM', title:'Welcome to LYMX',                 desc:'Your 100 LYMX welcome bonus is ready. Spend it at any LYMX Business in the network.',         unread:false, v:'+100 LYMX', vClass:'gold' },
    { id:5, type:'spend',  day:'Yesterday', time:'7:42 PM', title:'1,800 LYMX redeemed',             desc:'Oakline Kitchen · Dinner ($18 off)',                                                           unread:false, v:'−1,800', vClass:'muted' },
    { id:6, type:'promo',  day:'Yesterday', time:'4:00 PM', title:'New Business: Empire Boba',       desc:'They just joined the network. 6 LYMX per $1 spent. 1.4 mi from you.',                          unread:true,  v:'New',      vClass:'muted' },

    { id:7, type:'referral', day:'Apr 26', time:'11:22 AM', title:'Daniel made his first purchase',  desc:'You earned 200 LYMX from your referral!',                                                     unread:false, v:'+200 LYMX', vClass:'green' },
    { id:8, type:'earn',  day:'Apr 24', time:'2:08 PM',  title:'You earned 640 LYMX',                desc:'Sun Market & Deli · Groceries',                                                                unread:false, v:'+640',     vClass:'green' },
  ];
  end-legacy-mock-disabled */

  let currentFilter = 'all';

  function setFilter(f, btn){
    currentFilter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    btn.classList.add('on');
    render();
  }

  function render(){
    let items = notifications;
    if (currentFilter === 'unread') items = items.filter(n => n.unread);
    else if (currentFilter !== 'all') items = items.filter(n => n.type === currentFilter);

    const feed = document.getElementById('feed');
    if (items.length === 0){
      feed.innerHTML = '<div class="empty"><div class="ic">📭</div>All caught up.</div>';
    } else {
      // Group by day
      const grouped = {};
      items.forEach(n => {
        if (!grouped[n.day]) grouped[n.day] = [];
        grouped[n.day].push(n);
      });
      let html = '';
      Object.keys(grouped).forEach(day => {
        html += `<div class="day-h">${day}</div>`;
        grouped[day].forEach(n => {
          const ctaCls = n.cta ? ' cta' : '';
          html += `
            <div class="notif ${n.unread ? 'unread' : ''}${ctaCls}" onclick="readOne(${n.id})">
              <div class="ic ${n.type}">${iconFor(n.type)}</div>
              <div class="body">
                <div class="h">${n.title}</div>
                <div class="d">${n.desc}</div>
                ${n.cta ? `<div class="t" style="color:var(--accent-2)">${n.cta}</div>` : `<div class="t">${n.time}</div>`}
              </div>
              <div class="v ${n.vClass || ''}">${n.v}</div>
            </div>
          `;
        });
      });
      feed.innerHTML = html;
    }

    // Counts
    document.getElementById('ct-all').textContent = notifications.length;
    const unreadCount = notifications.filter(n => n.unread).length;
    document.getElementById('ct-unread').textContent = unreadCount;

    // 2026-05-24 — Disable "Mark all read" when there's nothing unread.
    const markBtn = document.getElementById('markAllReadBtn');
    if (markBtn) {
      const disable = unreadCount === 0;
      markBtn.disabled = disable;
      markBtn.style.opacity = disable ? '0.4' : '';
      markBtn.style.cursor = disable ? 'default' : 'pointer';
      markBtn.setAttribute('aria-disabled', disable ? 'true' : 'false');
    }

    // 2026-05-24 — Disable filter chips whose category has 0 items (other
    // than the 'all' / 'unread' counters which we always show).
    const typeCounts = notifications.reduce((acc, n) => { acc[n.type] = (acc[n.type] || 0) + 1; return acc; }, {});
    document.querySelectorAll('.chip').forEach(chip => {
      const f = chip.getAttribute('data-f');
      if (f === 'all' || f === 'unread') return;
      const map = { earn: 'earn', spend: 'spend', promo: 'promo', referral: 'referral', system: 'system' };
      const key = map[f] || f;
      const empty = !typeCounts[key];
      chip.disabled = empty;
      chip.style.opacity = empty ? '0.35' : '';
      chip.style.cursor = empty ? 'default' : 'pointer';
      chip.setAttribute('aria-disabled', empty ? 'true' : 'false');
    });
  }

  function iconFor(type){
    return {
      earn: '+',
      spend: '−',
      promo: '★',
      referral: '🎁',
      system: 'ℹ',
    }[type] || '•';
  }

  function readOne(id){
    const n = notifications.find(x => x.id === id);
    if (n) n.unread = false;
    render();
  }

  function markAllRead(){
    notifications.forEach(n => n.unread = false);
    render();
  }

  render();
</script>

<script src="lymx-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lymx-auth.js"></script>
<script>
(async function loadNotificationsFromDb(){
  try {
    if (!window.LYMX || !window.LYMX.requireAuth) return;
    const user = await window.LYMX.requireAuth();
    if (!user) return;
    const sb = window.LYMX.sb;

    const day14ago = new Date(Date.now() - 14*24*60*60*1000).toISOString();
    // 2026-05-26 Module 5 unification: single source = lymx_issuances. Earn rows
    // (positive amount_lymx) AND redemption rows (negative amount_lymx with
    // reason='redemption') both appear in one query. The deprecated
    // wallets+transactions chain is gone.
    const [issRes, refRes] = await Promise.all([
      sb.from('lymx_issuances')
        .select('id, amount_lymx, reason, created_at, businesses(display_name)')
        .eq('recipient_user_id', user.id)
        .gte('created_at', day14ago)
        .order('created_at', { ascending: false }).limit(120),
      sb.from('referrals')
        .select('id, status, invitee_user_id, created_at, inviter_bonus_amount')
        .eq('inviter_user_id', user.id)
        .gte('created_at', day14ago)
        .order('created_at', { ascending: false }).limit(30)
    ]);
    // Split iss rows into earnings + redemptions for the existing render code
    const issRows = (issRes.data || []).filter(r => (r.reason !== 'redemption') && Number(r.amount_lymx || 0) > 0);
    const txRows  = (issRes.data || []).filter(r => r.reason === 'redemption' || Number(r.amount_lymx || 0) < 0)
      .map(r => ({ id: r.id, lymx_amount: Math.abs(Number(r.amount_lymx || 0)), type: 'redemption', created_at: r.created_at, businesses: r.businesses }));
    // Shape-compat: notifications.html below reads issRes.data and txRes.data
    issRes.data = issRows;
    const txRes = { data: txRows };

    function dayLabel(iso) {
      const d = new Date(iso);
      const today = new Date(); today.setHours(0,0,0,0);
      const y = new Date(today.getTime() - 86400000);
      if (d >= today) return 'Today';
      if (d >= y) return 'Yesterday';
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }
    function timeLabel(iso) {
      return new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    }
    function fmt(n) { return Math.abs(Number(n||0)).toLocaleString('en-US'); }

    notifications.length = 0;
    let nextId = 1;
    (issRes.data || []).forEach(i => {
      const biz = (i.businesses && i.businesses.display_name) || (i.reason || 'LYMX Network');
      notifications.push({
        id: nextId++, type: 'earn',
        day: dayLabel(i.created_at), time: timeLabel(i.created_at),
        title: 'You earned ' + fmt(i.amount_lymx) + ' LYMX',
        desc: biz + (i.reason ? ' · ' + i.reason : ''),
        unread: false,
        v: '+' + fmt(i.amount_lymx), vClass: 'green',
        _ts: i.created_at
      });
    });
    (txRes.data || []).forEach(t => {
      const biz = (t.businesses && t.businesses.display_name) || 'LYMX Business';
      notifications.push({
        id: nextId++, type: 'spend',
        day: dayLabel(t.created_at), time: timeLabel(t.created_at),
        title: fmt(t.lymx_amount) + ' LYMX redeemed',
        desc: biz,
        unread: false,
        v: '−' + fmt(t.lymx_amount), vClass: 'muted',
        _ts: t.created_at
      });
    });
    (refRes.data || []).forEach(r => {
      notifications.push({
        id: nextId++, type: 'referral',
        day: dayLabel(r.created_at), time: timeLabel(r.created_at),
        title: r.status === 'credited' ? 'Referral bonus credited' : 'Referral pending',
        desc: r.status === 'credited' ? ('+' + fmt(r.inviter_bonus_amount) + ' LYMX added to your wallet') : 'Will credit when they make their first purchase',
        unread: r.status === 'credited',
        v: r.status === 'credited' ? ('+' + fmt(r.inviter_bonus_amount)) : 'Pending',
        vClass: r.status === 'credited' ? 'green' : 'muted',
        _ts: r.created_at
      });
    });

    notifications.sort((a, b) => (b._ts || '').localeCompare(a._ts || ''));
    if (typeof render === 'function') render();

    const feed = document.getElementById('feed');
    if (feed && notifications.length === 0) {
      // 2026-05-24 #f45a94ab (Rae) - empty-state with actionable shortcuts so users don't have to navigate to find Invite/Browse. Primary CTA = share-hub (universal across roles). Secondary CTA = browse rewards.
      feed.innerHTML = '<div class="empty">'
        + '<div class="ic">📭</div>'
        + '<div style="font-weight:700;color:#1a1f27;font-size:15.5px;margin-bottom:6px">No notifications yet</div>'
        + '<div style="font-size:13.5px;line-height:1.5;color:#5b6472;margin-bottom:18px;max-width:320px;margin-left:auto;margin-right:auto">Earn, spend, or invite a friend and updates will show up here.</div>'
        + '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
        +   '<a href="share-hub.html" style="display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border-radius:9px;font-weight:700;font-size:13.5px;background:#0e1116;color:#fff;text-decoration:none">📤 Invite a friend</a>'
        +   '<a href="browse.html" style="display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border-radius:9px;font-weight:700;font-size:13.5px;background:#f6f7f9;color:#0e1116;text-decoration:none;border:1px solid #e6e8ec">🔎 Browse rewards</a>'
        + '</div>'
        + '</div>';
    }
  } catch (e) {
    console.warn('[notifications] load failed', e);
  }
})();
</script>
<script src="lymx-feedback.js" defer></script>
<script src="lymx-nav.js" defer></script>
<script src="lymx-sidebar.js" defer></script>
<script src="lymx-app.js" defer></script>
</body>
</html>
