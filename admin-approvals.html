<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="LYMX Admin — review and approve change requests from operators." />
<title>Approvals · LYMX Admin</title>
<style>
  :root{--ink:#0e1116;--ink-2:#1a1f27;--muted:#5b6472;--line:#e6e8ec;--bg:#ffffff;--bg-soft:#f6f7f9;--accent:#0a84ff;--accent-2:#0050c7;--ok:#13a26b;--warn:#f0a020;--danger:#e0413e;--gold:#d4af37;--maxw:1080px}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-soft)}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);line-height:1.55}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

  header.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px;gap:16px;max-width:1320px;margin:0 auto;padding:0 24px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px}
  .role-tag{background:rgba(208,32,84,.12);color:#a01644;font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:6px;margin-left:6px}
  .nav-links{display:flex;gap:18px;font-size:14.5px;color:var(--ink-2);flex-wrap:wrap}
  .nav-links a:hover{color:var(--accent)}
  .nav-links a.on{color:var(--accent);font-weight:700}
  .admin-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#a01644,#6e0e2f);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  @media(max-width:1100px){.nav-links{display:none}}

  .page{padding:28px 0 64px}
  .page-head{display:flex;justify-content:space-between;align-items:end;flex-wrap:wrap;gap:14px;margin-bottom:18px}
  .page-head h1{margin:0;font-size:28px;font-weight:800;letter-spacing:-.01em}
  .page-head p{margin:6px 0 0;color:var(--muted);font-size:15px}

  .tabs{display:flex;gap:4px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:18px;width:fit-content}
  .tab{padding:8px 16px;border-radius:7px;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--muted)}
  .tab.on{background:var(--ink);color:#fff}
  .tab .count{background:var(--bg-soft);color:var(--ink);padding:1px 7px;border-radius:999px;font-size:11px;margin-left:6px}
  .tab.on .count{background:rgba(255,255,255,.2);color:#fff}

  .request{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px 24px;margin-bottom:14px}
  .request .hdr{display:flex;justify-content:space-between;align-items:start;gap:14px;flex-wrap:wrap;margin-bottom:10px}
  .request .who{font-size:13px;color:var(--muted)}
  .request .who strong{color:var(--ink)}
  .request .when{font-size:12px;color:var(--muted)}
  .request h3{margin:0;font-size:16px;font-weight:800}
  .request .target{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;background:var(--bg-soft);padding:2px 8px;border-radius:6px;display:inline-block;margin-right:6px}
  .diff{display:grid;grid-template-columns:1fr 32px 1fr;gap:8px;align-items:center;background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin:10px 0;font-size:14px}
  .diff .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:3px}
  .diff .val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
  .diff .arrow{text-align:center;color:var(--accent-2);font-size:18px;font-weight:800}
  .diff .from .val{color:var(--muted)}
  .diff .to .val{color:var(--ok)}
  .rationale{background:#eef5ff;border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;font-size:13.5px;color:var(--ink-2);margin:10px 0}
  .rationale .lab{font-size:11px;color:var(--accent-2);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:3px}
  .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
  .btn{padding:9px 16px;border-radius:8px;font-weight:700;font-size:13.5px;border:0;cursor:pointer;font-family:inherit}
  .btn-approve{background:var(--ok);color:#fff}
  .btn-approve:hover{background:#0a6e44}
  .btn-reject{background:#fff;border:1px solid #f5b7b7;color:var(--danger)}
  .btn-reject:hover{background:#fdecec}
  .btn-secondary{background:#fff;border:1px solid var(--line);color:var(--ink)}

  .empty{padding:60px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:14px}
  .empty .big{font-size:48px;margin-bottom:8px}

  .status-pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .status-pill.applied{background:#e6f5ee;color:#0a6e44}
  .status-pill.rejected{background:#eef0f4;color:#6b7280}
  .status-pill.withdrawn{background:#fff3d4;color:#92400e}
  .status-pill.failed{background:#fdecec;color:#9b1c1c}

  .status-msg{padding:11px 14px;border-radius:8px;font-size:14px;margin-top:14px;display:none}
  .status-msg.show{display:block}
  .status-msg.ok{background:#e6f5ee;border:1px solid #a8d8c0;color:#0a6e44}
  .status-msg.err{background:#fdecec;border:1px solid #f5b7b7;color:#9b1c1c}
</style>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<meta name="theme-color" content="#0a84ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="LYMX" />
<meta name="mobile-web-app-capable" content="yes" />
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="admin-dashboard.html" class="brand">LYMX <span class="role-tag">Admin</span></a>
    <nav class="nav-links">
      <a href="admin-dashboard.html">Home</a>
      <a href="admin-approvals.html" class="on">Approvals</a>
      <a href="admin-businesses.html">Businesses</a>
      <a href="admin-promos.html">Promos</a>
      <a href="admin-staff.html">Staff</a>
      <a href="admin-tech-support.html">Tech Support</a>
    </nav>
    <div class="admin-avatar" id="userInitial">·</div>
  </div>
</header>

<main class="page">
  <div class="wrap">
    <div class="page-head">
      <div>
        <h1>✅ Approvals</h1>
        <p>Review change requests submitted by staff. Approve to apply, reject to dismiss.</p>
      </div>
    </div>

    <div class="tabs">
      <div class="tab on" data-tab="pending">Pending <span class="count" id="cPending">0</span></div>
      <div class="tab" data-tab="recent">Recently reviewed <span class="count" id="cRecent">0</span></div>
    </div>

    <div id="list"></div>
    <div class="status-msg" id="status"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lymx-config.js"></script>
<script src="lymx-auth.js"></script>
<script>
const SUPABASE_URL = window.LYMX_CONFIG && window.LYMX_CONFIG.SUPABASE_URL;
const ANON = window.LYMX_CONFIG && window.LYMX_CONFIG.SUPABASE_ANON_KEY;

let activeTab = 'pending';

async function authedFetch(path, opts = {}) {
  const session = window.LYMX && window.LYMX.getSession ? await window.LYMX.getSession() : null;
  const token = (session && session.access_token) || ANON;
  return fetch(SUPABASE_URL + path, {
    ...opts,
    headers: { 'apikey': ANON, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
}
function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function fmtTime(iso) { return new Date(iso).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); }
function setStatus(text, kind) {
  const el = document.getElementById('status');
  if (!text) { el.className = 'status-msg'; el.textContent = ''; return; }
  el.className = 'status-msg show ' + (kind || 'ok');
  el.textContent = text;
}

function renderRequest(r, isPending) {
  const cur = r.current_value || {};
  const pr  = r.proposed_value || {};
  const curAmt = cur.amount_lymx;
  const prAmt  = pr.amount_lymx;
  return '<div class="request">' +
    '<div class="hdr">' +
      '<div>' +
        '<h3>' + escapeHtml(r.request_type.replace(/_/g, ' ')) + '</h3>' +
        '<div class="who">' +
          '<span class="target">' + escapeHtml(r.target_table) + ' · ' + escapeHtml(r.target_id || '—') + '</span>' +
          'Submitted by <strong>' + escapeHtml(r.proposed_by_email || 'staff') + '</strong> (' + escapeHtml(r.proposed_by_role || '—') + ')' +
        '</div>' +
      '</div>' +
      '<div class="when">' + fmtTime(r.proposed_at) + (r.reviewed_at ? '<br><span class="status-pill ' + r.status + '">' + r.status + '</span>' : '') + '</div>' +
    '</div>' +
    (curAmt !== undefined || prAmt !== undefined
      ? '<div class="diff">' +
          '<div class="from"><div class="lab">Current</div><div class="val">' + (curAmt !== undefined ? curAmt.toLocaleString() + ' LYMX' : '—') + '</div></div>' +
          '<div class="arrow">→</div>' +
          '<div class="to"><div class="lab">Proposed</div><div class="val">' + (prAmt !== undefined ? prAmt.toLocaleString() + ' LYMX' : '—') + '</div></div>' +
        '</div>'
      : '<div class="diff" style="grid-template-columns:1fr"><div><div class="lab">Proposed</div><div style="font-size:13px">' + escapeHtml(JSON.stringify(pr)) + '</div></div></div>') +
    (r.rationale ? '<div class="rationale"><div class="lab">Rationale</div>' + escapeHtml(r.rationale) + '</div>' : '') +
    (r.business_impact ? '<div class="rationale" style="border-left-color:var(--warn)"><div class="lab" style="color:var(--warn)">Expected impact</div>' + escapeHtml(r.business_impact) + '</div>' : '') +
    (isPending ? '<div class="actions">' +
      '<button class="btn btn-reject" data-action="reject" data-id="' + r.id + '">Reject</button>' +
      '<button class="btn btn-approve" data-action="approve" data-id="' + r.id + '">Approve &amp; Apply</button>' +
    '</div>' : (r.review_notes ? '<div class="rationale" style="border-left-color:var(--muted)"><div class="lab" style="color:var(--muted)">Admin notes</div>' + escapeHtml(r.review_notes) + '</div>' : '')) +
  '</div>';
}

async function loadList() {
  if (activeTab === 'pending') {
    const r = await authedFetch('/rest/v1/v_pending_changes?select=*&order=proposed_at.desc');
    if (!r.ok) {
      document.getElementById('list').innerHTML = '<div class="empty"><div class="big">⚠️</div>Could not load (admin role required).</div>';
      return;
    }
    const rows = await r.json();
    document.getElementById('cPending').textContent = rows.length;
    if (!rows.length) {
      document.getElementById('list').innerHTML = '<div class="empty"><div class="big">✅</div><strong>All caught up.</strong> No pending requests right now.</div>';
      return;
    }
    document.getElementById('list').innerHTML = rows.map(r => renderRequest(r, true)).join('');
    document.querySelectorAll('[data-action]').forEach(b => b.addEventListener('click', () => handleAction(b.dataset.id, b.dataset.action)));
  } else {
    const r = await authedFetch('/rest/v1/change_requests?status=in.(applied,rejected,withdrawn,failed)&select=*&order=reviewed_at.desc.nullslast&limit=50');
    if (!r.ok) { document.getElementById('list').innerHTML = '<div class="empty">Could not load.</div>'; return; }
    const rows = await r.json();
    document.getElementById('cRecent').textContent = rows.length;
    if (!rows.length) {
      document.getElementById('list').innerHTML = '<div class="empty">No reviews yet.</div>';
      return;
    }
    document.getElementById('list').innerHTML = rows.map(r => renderRequest(r, false)).join('');
  }
}

async function handleAction(id, action) {
  const notes = prompt('Optional ' + action + ' notes (visible to the submitter):') || null;
  if (action === 'approve') {
    const r = await authedFetch('/rest/v1/rpc/approve_change_request', {
      method: 'POST',
      body: JSON.stringify({ p_request_id: id, p_notes: notes })
    });
    if (!r.ok) { setStatus('Approve failed: ' + r.status, 'err'); return; }
    const result = await r.json();
    if (result.success === false) {
      setStatus('Apply failed: ' + result.error, 'err');
    } else {
      setStatus('Approved and applied.', 'ok');
    }
  } else {
    const r = await authedFetch('/rest/v1/rpc/reject_change_request', {
      method: 'POST',
      body: JSON.stringify({ p_request_id: id, p_notes: notes })
    });
    if (!r.ok) { setStatus('Reject failed: ' + r.status, 'err'); return; }
    setStatus('Rejected.', 'ok');
  }
  loadList();
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  activeTab = t.dataset.tab;
  loadList();
}));

(async () => {
  if (!window.LYMX || !window.LYMX.getSession) return;
  const s = await window.LYMX.getSession();
  if (!s) {
    document.getElementById('list').innerHTML = '<div class="empty">Sign in as admin first.</div>';
    return;
  }
  document.getElementById('userInitial').textContent = (s.user.email || 'K')[0].toUpperCase();
  loadList();
  setInterval(loadList, 30000);
})();
</script>

<script src="lymx-feedback.js" defer></script>
<script src="lymx-app.js" defer></script>
</body>
</html>
