<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Roster · LYMX Admin</title>
<style>
  :root{--ink:#0e1116;--muted:#5b6472;--line:#e6e8ec;--bg:#fff;--bg-soft:#f6f7f9;--accent:#0a84ff;--accent-2:#0050c7;--ok:#13a26b;--warn:#f0a020;--danger:#e0413e;--maxw:1320px}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-soft);min-height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;color:var(--ink);line-height:1.55}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;width:100%}
  header.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px;gap:16px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px}
  .role-tag{background:rgba(208,32,84,.12);color:#a01644;font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:6px;margin-left:6px}
  .nav-links{display:flex;gap:18px;font-size:14.5px;color:var(--ink);flex-wrap:wrap}
  .nav-links a:hover{color:var(--accent)}
  .nav-links a.on{color:var(--accent);font-weight:700}
  .admin-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#a01644,#6e0e2f);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  main{padding:28px 0 60px}
  h1{font-size:28px;font-weight:800;margin:0 0 6px}
  .sub{color:var(--muted);font-size:15px;margin-bottom:24px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .card .label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .card .val{font-size:28px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
  .tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;padding:12px 14px;background:var(--bg-soft);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line)}
  td{padding:14px;border-bottom:1px solid #f1f3f6;vertical-align:middle}
  tr:hover td{background:#fafbfd}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .pill.admin{background:#fee2e2;color:#7f1d1d}
  .pill.manager{background:#fef3c7;color:#78350f}
  .pill.staff{background:#dbeafe;color:#1e40af}
  .pill.cfo{background:#e9d5ff;color:#5b21b6}
  .pill.hr{background:#d1fae5;color:#065f46}
  .pill.remote{background:#cffafe;color:#155e75}
  .pill.offline{background:#e5e7eb;color:#374151}
  .pill.live{background:#d1fae5;color:#065f46}
  .empty{padding:48px 24px;text-align:center;color:var(--muted)}
  .btn{padding:7px 14px;border-radius:8px;font-weight:700;font-size:13px;border:0;cursor:pointer;font-family:inherit;background:#fff;border:1px solid var(--line);color:var(--muted)}
  .btn:hover{border-color:var(--ink);color:var(--ink)}
</style>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="64x64" href="favicon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<meta name="theme-color" content="#0a84ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="LYMX" />
<meta name="mobile-web-app-capable" content="yes" />
</head>
<body data-role-required="perm:hr_admin">

<header class="nav">
  <div class="wrap nav-inner">
    <a href="admin-dashboard.html" class="brand">LYMX <span class="role-tag">Team</span></a>
    <nav class="nav-links">
      <a href="admin-dashboard.html">Home</a>
      <a href="admin-team-roster.html" class="on">Roster</a>
      <a href="admin-timesheets.html">Timesheets</a>
      <a href="admin-time-off.html">Time-off</a>
      <a href="admin-verifications.html">Verifications</a>
      <a href="admin-tech-support.html">Tech</a>
      <a href="admin-chat.html">Chat</a>
    </nav>
    <div class="admin-avatar" id="userInitial">·</div>
  </div>
</header>

<main class="wrap">
  <h1>Team Roster</h1>
  <div class="sub">All LYMX staff members. Click a person to edit their role, anchor, or remote permission.</div>

  <div class="cards">
    <div class="card">  <div class="label">Total team</div>     <div class="val" id="kTotal">—</div></div>
    <div class="card">  <div class="label">Admins</div>          <div class="val" id="kAdmin" style="color:#7f1d1d">—</div></div>
    <div class="card">  <div class="label">CFOs</div>            <div class="val" id="kCfo" style="color:#5b21b6">—</div></div>
    <div class="card">  <div class="label">Remote allowed</div>  <div class="val" id="kRemote" style="color:#155e75">—</div></div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Member</th>
          <th style="width:120px">Role</th>
          <th>Title / flags</th>
          <th style="width:140px">Anchor</th>
          <th style="width:170px">Last clock-in</th>
          <th style="width:90px"></th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lymx-config.js"></script>
<script src="lymx-auth.js"></script>
<script>
const SUPABASE_URL = window.LYMX_CONFIG && window.LYMX_CONFIG.SUPABASE_URL;
const ANON         = window.LYMX_CONFIG && window.LYMX_CONFIG.SUPABASE_ANON_KEY;
async function authedFetch(path) {
  const s = window.LYMX && window.LYMX.getSession ? await window.LYMX.getSession() : null;
  const token = (s && s.access_token) || ANON;
  return fetch(SUPABASE_URL + path, { headers: { 'apikey': ANON, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } });
}
function esc(s) { return (s || '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTime(iso) { if (!iso) return '—'; const d = new Date(iso); const now = new Date(); const sameDay = d.toDateString() === now.toDateString(); return sameDay ? 'Today ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : d.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); }

async function load() {
  const r = await authedFetch('/rest/v1/v_team_roster?select=*');
  if (!r.ok) {
    document.getElementById('rows').innerHTML = `<tr><td colspan="6" class="empty">Could not load (HTTP ${r.status}). Make sure migration 025 has been applied.</td></tr>`;
    return;
  }
  const rows = await r.json();
  document.getElementById('kTotal').textContent  = rows.length;
  document.getElementById('kAdmin').textContent  = rows.filter(x => x.role === 'admin').length;
  document.getElementById('kCfo').textContent    = rows.filter(x => x.is_cfo).length;
  document.getElementById('kRemote').textContent = rows.filter(x => x.remote_allowed).length;

  if (!rows.length) {
    document.getElementById('rows').innerHTML = `<tr><td colspan="6" class="empty">No staff yet — promote someone via the staff_roles table.</td></tr>`;
    return;
  }
  document.getElementById('rows').innerHTML = rows.map(x => {
    const initial = ((x.email || 'L')[0] || 'L').toUpperCase();
    const flags = [];
    if (x.is_cfo) flags.push('<span class="pill cfo">CFO</span>');
    if (x.is_hr) flags.push('<span class="pill hr">HR</span>');
    if (x.remote_allowed) flags.push('<span class="pill remote">Remote OK</span>');
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0a84ff,#0050c7);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px">${initial}</div><div><div style="font-weight:700">${esc(x.email)}</div><div style="font-size:11px;color:var(--muted)">${esc(x.user_id?.slice(0, 8) || '')}…</div></div></div></td>
      <td><span class="pill ${esc(x.role || 'staff')}">${esc(x.role || 'staff')}</span></td>
      <td>${esc(x.job_title || '—')}${flags.length ? '<br><div style="margin-top:4px">' + flags.join(' ') + '</div>' : ''}</td>
      <td>${x.has_anchor ? '<span class="pill live">✓ Set</span>' : '<span class="pill offline">Not set</span>'}<br><span style="font-size:11px;color:var(--muted)">${x.geofence_radius_m || '—'}m radius</span></td>
      <td><span style="font-size:13px">${esc(fmtTime(x.last_clock_in))}</span></td>
      <td><button class="btn" data-uid="${x.user_id}">Edit</button></td>
    </tr>`;
  }).join('');
}

(async function init() {
  const s = window.LYMX && window.LYMX.getSession ? await window.LYMX.getSession() : null;
  if (!s) { document.body.innerHTML = '<div style="padding:60px;text-align:center;font-size:18px"><a href="login.html">Sign in</a> as admin to view the team roster.</div>'; return; }
  document.getElementById('userInitial').textContent = ((s.user.email || 'L')[0] || 'L').toUpperCase();
  load();
  setInterval(load, 30000);
})();
</script>
<script src="lymx-feedback.js" defer></script>
<script src="lymx-app.js" defer></script>
<script src="lymx-role-gate.js" defer></script>
</body>
</html>
