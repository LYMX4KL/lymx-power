<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="LYMX Admin — pending clock-in requests queue." />
<meta name="robots" content="noindex,nofollow" />
<title>Clock-in requests · LYMX Admin</title>
<style>
  :root{--ink:#0e1116;--ink-2:#1a1f27;--muted:#5b6472;--line:#e6e8ec;--bg:#ffffff;--bg-soft:#f6f7f9;--accent:#0a84ff;--ok:#13a26b;--warn:#f0a020;--danger:#e0413e;--maxw:960px}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-soft)}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);line-height:1.55}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  .page{padding:28px 0 80px}
  .page-head h1{margin:0;font-size:26px;font-weight:800;letter-spacing:-.01em}
  .page-head p{margin:6px 0 18px;color:var(--muted);font-size:14.5px}
  .row{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;padding:14px 16px;border-left:4px solid var(--warn)}
  .row .top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start}
  .row .who{font-weight:800;font-size:14.5px;color:var(--ink)}
  .row .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .row .address{font-weight:700;color:var(--accent);margin:6px 0 4px;font-size:14px}
  .row .reason{background:#f6f7f9;border-left:3px solid var(--line);padding:7px 9px;border-radius:0 6px 6px 0;font-size:13px;color:var(--ink-2);margin-top:4px}
  .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .btn{appearance:none;border:0;border-radius:7px;padding:7px 13px;font:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-outline{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn-approve{background:var(--ok);color:#fff}
  .btn-deny{background:var(--danger);color:#fff}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .pill-kind{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-left:6px;vertical-align:1px}
  .pill-kind.ongoing{background:#e6f0ff;color:#0a3a8a}
  .pill-kind.single_day{background:#fff3d8;color:#7a4a08}
  .banner{padding:11px 14px;border-radius:8px;margin-bottom:14px;font-size:14px}
  .banner.ok{background:#dff8ec;color:#0c6940}
  .banner.err{background:#fde8e6;color:#7a1a17}
</style>
</head>
<body>
<script src="lymx-config.js"></script>
<script src="lymx-app.js"></script>
<script src="lymx-nav.js" defer></script>

<main class="wrap page">
  <div class="page-head">
    <h1>Clock-in requests</h1>
    <p>Just the pending queue. For full permission management (approved / denied / expired), use <a href="admin-clock-in-permissions.html" style="color:var(--accent);text-decoration:underline">Clock-in permissions</a>.</p>
  </div>

  <div id="bannerArea"></div>
  <div id="list"><div class="empty">Loading…</div></div>
</main>

<script src="lymx-sidebar.js" defer></script>
<script>
(async function init(){
  if (!window.LYMX || !window.LYMX.getSession) { setTimeout(init,100); return; }
  const session = await window.LYMX.getSession();
  if (!session) { location.href = '/login.html?next=' + encodeURIComponent(location.pathname); return; }
  await load();
})();

const esc = (s) => String(s == null ? '' : s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
function banner(t, m) {
  document.getElementById('bannerArea').innerHTML = '<div class="banner ' + t + '">' + esc(m) + '</div>';
  if (t === 'ok') setTimeout(() => document.getElementById('bannerArea').innerHTML = '', 4000);
}

async function load() {
  const cfg = window.LYMX_CONFIG;
  const session = await window.LYMX.getSession();
  const tok = session.access_token;
  const r = await fetch(cfg.SUPABASE_URL + '/rest/v1/clock_in_permissions?status=eq.pending&order=requested_at.asc&select=*', {
    headers: { apikey: cfg.SUPABASE_ANON_KEY, Authorization: 'Bearer '+tok }
  });
  if (!r.ok) { document.getElementById('list').innerHTML = '<div class="empty">Load failed.</div>'; return; }
  const rows = await r.json();
  if (!rows.length) { document.getElementById('list').innerHTML = '<div class="empty">No pending requests.</div>'; return; }
  document.getElementById('list').innerHTML = rows.map(r =>
    '<div class="row">' +
      '<div class="top">' +
        '<div>' +
          '<div class="who">' + esc(r.user_name_snapshot || r.user_email_snapshot || '?') +
            '<span class="pill-kind ' + esc(r.kind) + '">' + esc(r.kind === 'ongoing' ? 'ongoing WFH' : 'single day') + '</span>' +
          '</div>' +
          '<div class="meta">' + esc(r.user_email_snapshot || '') + ' · submitted ' + new Date(r.requested_at).toLocaleString() +
            (r.request_date ? ' · target ' + r.request_date : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="address">' + esc(r.request_address) + '</div>' +
      '<div class="reason"><strong>Reason:</strong> ' + esc(r.request_reason) + '</div>' +
      '<div class="actions">' +
        '<a class="btn btn-primary" href="admin-clock-in-permissions.html">Review in full UI →</a>' +
        '<button class="btn btn-deny" data-id="' + r.id + '" onclick="quickDeny(\'' + r.id + '\')">Quick deny</button>' +
      '</div>' +
    '</div>'
  ).join('');
}

async function quickDeny(id) {
  const note = prompt('Note for staff (why denied):', '');
  if (note === null) return;
  const cfg = window.LYMX_CONFIG;
  const session = await window.LYMX.getSession();
  const tok = session.access_token;
  const reviewerName = (session.user.user_metadata && (session.user.user_metadata.full_name || session.user.user_metadata.name))
    || (session.user.email || '').split('@')[0] || 'HR';
  const r = await fetch(cfg.SUPABASE_URL + '/rest/v1/clock_in_permissions?id=eq.' + id, {
    method:'PATCH',
    headers:{ apikey: cfg.SUPABASE_ANON_KEY, Authorization:'Bearer '+tok, 'Content-Type':'application/json' },
    body: JSON.stringify({
      status: 'denied',
      reviewed_by_id: session.user.id,
      reviewed_by_name: reviewerName,
      reviewed_at: new Date().toISOString(),
      review_notes: note || null
    })
  });
  if (!r.ok) { banner('err','Deny failed.'); return; }
  banner('ok','Denied.');
  await load();
}
</script>
</body>
</html>
